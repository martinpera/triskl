<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chat · triskl IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #f7f9fc;
      color: #0b1a33;
    }
    button {
      font-family: inherit;
      cursor: pointer;
      background: none;
      border: 0;
      color: inherit;
    }
    input, textarea {
      font-family: inherit;
      outline: none;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d9e6; border-radius: 4px; }

    .app {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 40px rgba(0,0,0,0.04);
    }

    /* ─── Top bar ─── */
    .top {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #e9edf2;
      background: #fff;
    }
    .top .brand {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .top .brand .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      display: inline-block;
    }
    .top .brand small {
      font-weight: 500;
      font-size: 12px;
      color: #6b7d98;
      letter-spacing: 0.01em;
    }
    .top .ctx-chip {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #eff6ff;
      color: #1e4f8a;
      border: 1px solid #dbeafe;
      border-radius: 99px;
      padding: 4px 10px 4px 8px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 40%;
      cursor: default;
      transition: 0.12s;
    }
    .top .ctx-chip.hide { display: none; }
    .top .ctx-chip svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
    .top .actions {
      display: flex;
      gap: 2px;
      margin-left: 4px;
    }
    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #4a5a72;
      transition: 0.12s;
      border: none;
      background: transparent;
    }
    .icon-btn:hover {
      background: #f1f4f8;
      color: #0b1a33;
    }
    .icon-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* ─── Context chip row ─── */
    .ctx-row {
      flex-shrink: 0;
      padding: 6px 16px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 0;
    }
    .ctx-row:empty { display: none; }
    .ctx-chip-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #eff6ff;
      color: #1e4f8a;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      padding: 4px 8px 4px 10px;
      font-size: 12px;
      font-weight: 600;
      max-width: 100%;
    }
    .ctx-chip-item span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }
    .ctx-chip-item button {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #6b7d98;
      transition: 0.12s;
      background: none;
      border: none;
      cursor: pointer;
    }
    .ctx-chip-item button:hover {
      background: rgba(59,130,246,0.12);
      color: #dc2626;
    }
    .ctx-chip-item button svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
    }

    /* ─── Messages ─── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
    }
    .messages-inner {
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 10px;
      padding: 30px 20px;
      color: #4a5a72;
    }
    .empty-state .icon {
      font-size: 32px;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: #eff6ff;
      display: grid;
      place-items: center;
      color: #3b82f6;
    }
    .empty-state h2 {
      font-size: 20px;
      font-weight: 700;
      color: #0b1a33;
      letter-spacing: -0.3px;
    }
    .empty-state p {
      font-size: 14px;
      color: #6b7d98;
      max-width: 380px;
      line-height: 1.6;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      background: #e9edf2;
      color: #1e3a5f;
      margin-top: 2px;
    }
    .msg-row.user .msg-av {
      background: #3b82f6;
      color: #fff;
    }
    .msg-av svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    .msg-bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14.5px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f1f4f8;
      color: #0b1a33;
    }
    .msg-row.user .msg-bubble {
      background: #0b1a33;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.assistant .msg-bubble {
      border-bottom-left-radius: 4px;
    }
    .msg-ts {
      font-size: 10px;
      color: #8a9bb0;
      margin-top: 3px;
      padding: 0 4px;
    }
    .msg-row.user .msg-ts { text-align: right; }

    .typing-row {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 4px 0;
    }
    .typing-row.hidden { display: none; }
    .typing-dots {
      background: #f1f4f8;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      padding: 10px 14px;
      display: flex;
      gap: 4px;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8a9bb0;
      animation: pulse 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,60%,100% { transform: translateY(0); opacity:0.4; } 30% { transform: translateY(-5px); opacity:1; } }

    /* ─── Input ─── */
    .input-area {
      flex-shrink: 0;
      padding: 10px 16px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid #e9edf2;
      background: #fff;
    }
    .input-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-inner textarea {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 14.5px;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      line-height: 1.5;
      background: #f7f9fc;
      transition: 0.12s;
      color: #0b1a33;
    }
    .input-inner textarea:focus {
      border-color: #3b82f6;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.08);
    }
    .input-inner button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #0b1a33;
      color: #fff;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      transition: 0.12s;
      border: none;
    }
    .input-inner button:hover:not(:disabled) { background: #1e3a5f; }
    .input-inner button:active:not(:disabled) { transform: scale(0.94); }
    .input-inner button:disabled { background: #8a9bb0; cursor: not-allowed; }
    .input-inner button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
    }
    .input-hint {
      max-width: 680px;
      margin: 6px auto 0;
      font-size: 10.5px;
      color: #8a9bb0;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── Modal ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(11,26,51,0.35);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-sheet {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      max-height: 86vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
    }
    .modal-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .modal-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #f1f4f8;
      display: grid;
      place-items: center;
      color: #4a5a72;
      border: none;
      cursor: pointer;
    }
    .modal-close svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }

    .form-label {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #6b7d98;
      margin: 14px 0 5px;
    }
    .form-label:first-of-type { margin-top: 0; }
    .form-ctrl {
      width: 100%;
      padding: 10px 12px;
      font-size: 13.5px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      background: #f7f9fc;
      outline: none;
      transition: 0.12s;
      color: #0b1a33;
      appearance: auto;
    }
    .form-ctrl:focus { border-color: #3b82f6; background: #fff; }

    .scope-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 4px;
    }
    .scope-opt {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #4a5a72;
      text-align: left;
      transition: 0.12s;
      line-height: 1.3;
      background: #f7f9fc;
      cursor: pointer;
    }
    .scope-opt:hover { border-color: #3b82f6; }
    .scope-opt.active {
      background: #eff6ff;
      border-color: #3b82f6;
      color: #1e4f8a;
    }
    .scope-opt span { font-weight: 400; color: #6b7d98; }

    .item-pick-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      margin-top: 4px;
      background: #fff;
    }
    .item-pick {
      padding: 9px 12px;
      border-bottom: 1px solid #f1f4f8;
      cursor: pointer;
      font-size: 12.5px;
      transition: 0.1s;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .item-pick:last-child { border-bottom: 0; }
    .item-pick:hover { background: #f7f9fc; }
    .item-pick.active { background: #eff6ff; color: #1e4f8a; font-weight: 600; }
    .item-pick-sub {
      font-size: 10.5px;
      color: #6b7d98;
      font-weight: 400;
    }
    .modal-status {
      text-align: center;
      font-size: 11.5px;
      color: #6b7d98;
      min-height: 18px;
      margin-top: 8px;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .modal-actions button {
      flex: 1;
      height: 40px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      transition: 0.12s;
      border: none;
    }
    .btn-cancel {
      background: #f1f4f8;
      color: #4a5a72;
    }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-confirm {
      background: #3b82f6;
      color: #fff;
    }
    .btn-confirm:hover { background: #2563eb; }
    .btn-confirm:disabled { background: #8a9bb0; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #0b1a33;
      color: #fff;
      padding: 8px 18px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      z-index: 500;
      animation: fadeUp 0.2s ease;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      pointer-events: none;
    }
    .toast.err { background: #dc2626; }

    @media (max-width: 540px) {
      .top .brand small { display: none; }
      .msg-bubble { max-width: 88%; font-size: 14px; padding: 8px 12px; }
    }
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- ─── Top bar ─── -->
  <div class="top">
    <div class="brand">
      <span>triskl</span><span class="dot"></span><small>asistente</small>
    </div>
    <div class="ctx-chip hide" id="ctxChip">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span id="ctxLabel">contexto</span>
    </div>
    <div class="actions">
      <button class="icon-btn" id="newChatBtn" title="Nuevo chat">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="icon-btn" id="contextBtn" title="Agregar contexto">
        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
    </div>
  </div>

  <!-- ─── Context chip row ─── -->
  <div class="ctx-row" id="ctxRow"></div>

  <!-- ─── Messages ─── -->
  <div class="messages" id="messages">
    <div class="messages-inner" id="messagesInner">
      <div class="empty-state" id="emptyState">
        <div class="icon">🤖</div>
        <h2>¿Qué estudiamos hoy?</h2>
        <p>Preguntá lo que quieras. Podés adjuntar apuntes, transcripciones o texto como contexto para que la IA lo tenga en cuenta.</p>
      </div>
    </div>
  </div>

  <!-- ─── Input ─── -->
  <div class="input-area">
    <div class="input-inner">
      <textarea id="msgInput" rows="1" placeholder="Escribí tu mensaje…"></textarea>
      <button id="sendBtn" aria-label="Enviar">
        <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter para enviar · Shift+Enter salto de línea</div>
  </div>
</div>

<!-- ─── Modal: contexto ─── -->
<div class="modal-overlay hidden" id="contextModal">
  <div class="modal-sheet">
    <div class="modal-hdr">
      <div class="modal-title">Agregar contexto</div>
      <button class="modal-close" id="closeCtxModal"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>

    <div class="form-label">Materia</div>
    <select class="form-ctrl" id="ctxMateria"><option value="">Cargando…</option></select>

    <div id="ctxScopeWrap" style="display:none;">
      <div class="form-label">¿Qué querés incluir?</div>
      <div class="scope-grid">
        <button class="scope-opt" data-scope="materia_all">📚 Toda la materia<br><span>Apuntes + transcripciones</span></button>
        <button class="scope-opt" data-scope="materia_apuntes">📝 Todos los apuntes</button>
        <button class="scope-opt" data-scope="materia_trans">🎙 Todas las transcripciones</button>
        <button class="scope-opt" data-scope="one_apunte">📄 Un apunte…</button>
        <button class="scope-opt" data-scope="one_trans">🎧 Una transcripción…</button>
      </div>
    </div>

    <div id="ctxItemWrap" style="display:none;">
      <div class="form-label" id="ctxItemLabel">Elegí uno</div>
      <div class="item-pick-list" id="ctxItemList"></div>
    </div>

    <div class="modal-status" id="ctxStatus"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="ctxCancelBtn">Cancelar</button>
      <button class="btn-confirm" id="ctxConfirmBtn" disabled>Adjuntar</button>
    </div>
  </div>
</div>

<script>
  // ──────────────────────────────────────────────────────────────────────────────
  // CONFIGURACIÓN
  // ──────────────────────────────────────────────────────────────────────────────
  const API_HANDLER = '/api/handler';
  const API_CHAT    = '/api/chat';
  const LS_SESSION  = 'triskl_session';
  const LS_CHATS    = 'triskl_chats';

  let SESSION = null;
  try { SESSION = JSON.parse(localStorage.getItem(LS_SESSION) || '{}'); } catch(_) { SESSION = {}; }

  function authBody() {
    return { uuid: SESSION.id || null, password: SESSION.password || '' };
  }

  // ──────────────────────────────────────────────────────────────────────────────
  // HELPERS
  // ──────────────────────────────────────────────────────────────────────────────
  const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmtDate = iso => iso ? new Date(iso).toLocaleString('es-UY', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
  const stripHtml = html => {
    const d = document.createElement('div');
    d.innerHTML = String(html || '').replace(/<\/(p|div|li|h[1-6])>/gi,'\n').replace(/<br\s*\/?>/gi,'\n');
    return (d.textContent || d.innerText || '').trim();
  };
  const truncate = (text, max = 18000) => text.length <= max ? text : text.slice(0, max) + `\n\n[truncado — ${text.length - max} caracteres más]`;

  function toast(msg, err = false) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const el = document.createElement('div');
    el.className = 'toast' + (err ? ' err' : '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }

  async function apiCall(action, body = {}) {
    const res = await fetch(`${API_HANDLER}?action=${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...authBody(), ...body })
    });
    return res.json().catch(() => ({}));
  }

  // ──────────────────────────────────────────────────────────────────────────────
  // GESTIÓN DE CHATS (localStorage)
  // ──────────────────────────────────────────────────────────────────────────────
  function loadChats() {
    try { const arr = JSON.parse(localStorage.getItem(LS_CHATS) || '[]'); return Array.isArray(arr) ? arr : []; } catch(_) { return []; }
  }
  function saveChats() {
    try { localStorage.setItem(LS_CHATS, JSON.stringify(chats)); } catch(_) {}
  }

  let chats = loadChats();
  let currentChatId = null;

  function getCurrentChat() { return chats.find(c => c.id === currentChatId) || null; }

  function newChat() {
    const c = {
      id: 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
      title: 'Nuevo chat',
      messages: [],
      context: null,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };
    chats.unshift(c);
    currentChatId = c.id;
    saveChats();
    renderAll();
    document.getElementById('msgInput').focus();
  }

  function deleteChat(id) {
    if (!confirm('¿Eliminar este chat?')) return;
    chats = chats.filter(c => c.id !== id);
    saveChats();
    if (currentChatId === id) {
      if (chats.length) selectChat(chats[0].id);
      else newChat();
    } else renderAll();
  }

  function selectChat(id) {
    currentChatId = id;
    renderAll();
    document.getElementById('msgInput').focus();
  }

  // ──────────────────────────────────────────────────────────────────────────────
  // RENDER
  // ──────────────────────────────────────────────────────────────────────────────
  const messagesInner = document.getElementById('messagesInner');
  const ctxRow = document.getElementById('ctxRow');
  const ctxChip = document.getElementById('ctxChip');
  const ctxLabel = document.getElementById('ctxLabel');

  function renderAll() {
    renderMessages();
    renderContextChip();
  }

  function renderMessages() {
    const c = getCurrentChat();
    if (!c || !c.messages.length) {
      messagesInner.innerHTML = `
        <div class="empty-state" id="emptyState">
          <div class="icon">🤖</div>
          <h2>¿Qué estudiamos hoy?</h2>
          <p>Preguntá lo que quieras. Podés adjuntar apuntes, transcripciones o texto como contexto para que la IA lo tenga en cuenta.</p>
        </div>
      `;
      return;
    }
    let html = '';
    c.messages.forEach(m => {
      const isUser = m.role === 'user';
      const avatar = isUser ? (SESSION.username || '?')[0].toUpperCase() : '🤖';
      const ts = m.ts ? new Date(m.ts).toLocaleTimeString('es-UY', { hour:'2-digit', minute:'2-digit' }) : '';
      html += `
        <div class="msg-row ${isUser ? 'user' : 'assistant'}">
          <div class="msg-av">${avatar}</div>
          <div style="display:flex;flex-direction:column;max-width:78%;">
            <div class="msg-bubble">${esc(m.content)}</div>
            ${ts ? `<div class="msg-ts">${ts}</div>` : ''}
          </div>
        </div>
      `;
    });
    // typing row placeholder (se oculta con JS)
    html += `<div class="typing-row hidden" id="typingRow"><div class="msg-av" style="background:#e9edf2;color:#1e3a5f;">🤖</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    messagesInner.innerHTML = html;
    scrollToBottom();
  }

  function renderContextChip() {
    const c = getCurrentChat();
    if (!c || !c.context) {
      ctxChip.classList.add('hide');
      ctxRow.innerHTML = '';
      return;
    }
    ctxChip.classList.remove('hide');
    ctxLabel.textContent = c.context.label || 'contexto';
    ctxRow.innerHTML = `
      <div class="ctx-chip-item">
        <span>📎 ${esc(c.context.label || 'contexto')}</span>
        <button id="removeCtxBtn" title="Quitar"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    `;
    document.getElementById('removeCtxBtn').addEventListener('click', () => {
      const c2 = getCurrentChat();
      if (c2) { c2.context = null; saveChats(); renderAll(); toast('Contexto quitado'); }
    });
  }

  function scrollToBottom() {
    const container = document.getElementById('messages');
    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 20);
  }

  function showTyping(show) {
    const row = document.getElementById('typingRow');
    if (row) row.classList.toggle('hidden', !show);
    if (show) scrollToBottom();
  }

  // ──────────────────────────────────────────────────────────────────────────────
  // ENVÍO DE MENSAJES
  // ──────────────────────────────────────────────────────────────────────────────
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  let isSending = false;

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || isSending) return;

    let c = getCurrentChat();
    if (!c) { newChat(); c = getCurrentChat(); }

    // Guardar mensaje del usuario
    c.messages.push({ role: 'user', content: text, ts: Date.now() });
    if (c.title === 'Nuevo chat') c.title = text.slice(0, 60);
    c.updated_at = new Date().toISOString();
    saveChats();
    renderMessages();
    msgInput.value = '';
    msgInput.style.height = 'auto';
    msgInput.focus();

    isSending = true;
    sendBtn.disabled = true;
    showTyping(true);

    try {
      const history = c.messages.map(m => ({ role: m.role, content: m.content }));
      const payload = {
        ...authBody(),
        message: text,
        conversationHistory: history,
        context: c.context || null
      };

      const res = await fetch(API_CHAT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      let data;
      try { data = await res.json(); } catch(_) { data = {}; }
      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);

      const reply = data.response || '⚠️ No se recibió respuesta.';
      c.messages.push({ role: 'assistant', content: reply, ts: Date.now() });
      c.updated_at = new Date().toISOString();
      saveChats();
      renderMessages();
    } catch (err) {
      console.error(err);
      toast('Error: ' + (err.message || 'falló la conexión'), true);
      const c2 = getCurrentChat();
      if (c2) {
        c2.messages.push({ role: 'assistant', content: `❌ ${err.message || 'Error al comunicarse con el servidor.'}`, ts: Date.now() });
        saveChats();
        renderMessages();
      }
    } finally {
      isSending = false;
      sendBtn.disabled = false;
      showTyping(false);
      document.getElementById('msgInput').focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
  });

  // ──────────────────────────────────────────────────────────────────────────────
  // BOTONES: nuevo chat, contexto
  // ──────────────────────────────────────────────────────────────────────────────
  document.getElementById('newChatBtn').addEventListener('click', newChat);

  // ──────────────────────────────────────────────────────────────────────────────
  // MODAL DE CONTEXTO
  // ──────────────────────────────────────────────────────────────────────────────
  const ctxModal = document.getElementById('contextModal');
  const ctxMateria = document.getElementById('ctxMateria');
  const ctxScopeWrap = document.getElementById('ctxScopeWrap');
  const ctxItemWrap = document.getElementById('ctxItemWrap');
  const ctxItemList = document.getElementById('ctxItemList');
  const ctxItemLabel = document.getElementById('ctxItemLabel');
  const ctxStatus = document.getElementById('ctxStatus');
  const ctxConfirm = document.getElementById('ctxConfirmBtn');
  const ctxCancel = document.getElementById('ctxCancelBtn');
  const ctxClose = document.getElementById('closeCtxModal');

  let ctxAllSessions = [];
  let ctxAllAnnotations = [];
  let ctxSelectedMateria = null;
  let ctxSelectedScope = null;
  let ctxPickedItem = null;

  function openContextModal() {
    ctxModal.classList.remove('hidden');
    ctxScopeWrap.style.display = 'none';
    ctxItemWrap.style.display = 'none';
    ctxStatus.textContent = '';
    ctxConfirm.disabled = true;
    ctxSelectedMateria = null;
    ctxSelectedScope = null;
    ctxPickedItem = null;
    document.querySelectorAll('.scope-opt').forEach(b => b.classList.remove('active'));

    ctxMateria.innerHTML = '<option value="">Cargando…</option>';
    apiCall('sessions', { username: SESSION.username || '' }).then(rows => {
      ctxAllSessions = Array.isArray(rows) ? rows : [];
      const mats = [...new Set(ctxAllSessions.map(s => s.materia).filter(Boolean))].sort();
      if (!mats.length) {
        ctxMateria.innerHTML = '<option value="">No tenés materias</option>';
        return;
      }
      ctxMateria.innerHTML = '<option value="">Elegí una materia…</option>' + mats.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('');
    });
    // también cargar apuntes (annotation) para esa materia luego
  }

  function closeContextModal() {
    ctxModal.classList.add('hidden');
  }

  ctxClose.addEventListener('click', closeContextModal);
  ctxCancel.addEventListener('click', closeContextModal);
  ctxModal.addEventListener('click', e => { if (e.target === ctxModal) closeContextModal(); });

  ctxMateria.addEventListener('change', function() {
    ctxSelectedMateria = this.value || null;
    ctxSelectedScope = null;
    ctxPickedItem = null;
    ctxItemWrap.style.display = 'none';
    ctxConfirm.disabled = true;
    document.querySelectorAll('.scope-opt').forEach(b => b.classList.remove('active'));
    ctxScopeWrap.style.display = ctxSelectedMateria ? '' : 'none';
    ctxStatus.textContent = '';
  });

  document.querySelectorAll('.scope-opt').forEach(btn => {
    btn.addEventListener('click', async function() {
      document.querySelectorAll('.scope-opt').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      ctxSelectedScope = this.dataset.scope;
      ctxPickedItem = null;
      ctxConfirm.disabled = true;
      ctxItemWrap.style.display = 'none';

      if (ctxSelectedScope === 'one_apunte' || ctxSelectedScope === 'one_trans') {
        ctxItemWrap.style.display = '';
        ctxItemLabel.textContent = ctxSelectedScope === 'one_apunte' ? 'Elegí un apunte' : 'Elegí una transcripción';
        ctxItemList.innerHTML = '<div class="item-pick">Cargando…</div>';

        if (ctxSelectedScope === 'one_apunte') {
          const rows = await apiCall('annotations', { user_id: SESSION.id, materia: ctxSelectedMateria });
          ctxAllAnnotations = (Array.isArray(rows) ? rows : []).filter(r => r.type !== 'ia');
          if (!ctxAllAnnotations.length) {
            ctxItemList.innerHTML = '<div class="item-pick">Sin apuntes en esta materia.</div>';
            return;
          }
          ctxItemList.innerHTML = '';
          ctxAllAnnotations.forEach(a => {
            const name = stripHtml(a.content || '').split('\n').map(l => l.trim()).find(l => l) || 'Apunte sin título';
            const el = document.createElement('div');
            el.className = 'item-pick';
            el.innerHTML = `${esc(name.slice(0,60))}<div class="item-pick-sub">${fmtDate(a.created_at)}</div>`;
            el.addEventListener('click', () => {
              document.querySelectorAll('#ctxItemList .item-pick').forEach(x => x.classList.remove('active'));
              el.classList.add('active');
              ctxPickedItem = { kind: 'apunte', data: a, label: name.slice(0,60) };
              ctxConfirm.disabled = false;
            });
            ctxItemList.appendChild(el);
          });
        } else {
          const sessions = ctxAllSessions.filter(s => s.materia === ctxSelectedMateria);
          if (!sessions.length) {
            ctxItemList.innerHTML = '<div class="item-pick">Sin transcripciones en esta materia.</div>';
            return;
          }
          ctxItemList.innerHTML = '';
          sessions.forEach(s => {
            const el = document.createElement('div');
            el.className = 'item-pick';
            el.innerHTML = `${esc(s.materia)}<div class="item-pick-sub">${fmtDate(s.started_at)} · ${s.ended_at ? 'Terminada' : 'En curso'}</div>`;
            el.addEventListener('click', () => {
              document.querySelectorAll('#ctxItemList .item-pick').forEach(x => x.classList.remove('active'));
              el.classList.add('active');
              ctxPickedItem = { kind: 'session', data: s, label: `Transcripción · ${fmtDate(s.started_at)}` };
              ctxConfirm.disabled = false;
            });
            ctxItemList.appendChild(el);
          });
        }
      } else {
        ctxConfirm.disabled = false;
      }
    });
  });

  ctxConfirm.addEventListener('click', async function() {
    ctxStatus.textContent = 'Preparando…';
    ctxConfirm.disabled = true;
    try {
      let label = '', text = '';
      if (ctxSelectedScope === 'one_apunte' && ctxPickedItem) {
        label = `Apunte · ${ctxSelectedMateria}`;
        text = stripHtml(ctxPickedItem.data.content || '');
      } else if (ctxSelectedScope === 'one_trans' && ctxPickedItem) {
        label = `Transcripción · ${ctxSelectedMateria}`;
        const segs = await apiCall('segments', { session_id: ctxPickedItem.data.id });
        text = (Array.isArray(segs) ? segs : []).map(g => g.text).join('\n\n');
      } else if (ctxSelectedScope === 'materia_apuntes') {
        label = `Todos los apuntes · ${ctxSelectedMateria}`;
        const rows = await apiCall('annotations', { user_id: SESSION.id, materia: ctxSelectedMateria });
        const apuntes = (Array.isArray(rows) ? rows : []).filter(r => r.type !== 'ia');
        text = apuntes.map((a,i) => `APUNTE ${i+1} (${fmtDate(a.created_at)}):\n${stripHtml(a.content || '')}`).join('\n\n---\n\n');
      } else if (ctxSelectedScope === 'materia_trans') {
        label = `Todas las transcripciones · ${ctxSelectedMateria}`;
        const sessions = ctxAllSessions.filter(s => s.materia === ctxSelectedMateria);
        const parts = [];
        for (const s of sessions) {
          const segs = await apiCall('segments', { session_id: s.id });
          parts.push(`SESIÓN (${fmtDate(s.started_at)}):\n${(Array.isArray(segs) ? segs : []).map(g => g.text).join('\n')}`);
        }
        text = parts.join('\n\n---\n\n');
      } else if (ctxSelectedScope === 'materia_all') {
        label = `Materia completa · ${ctxSelectedMateria}`;
        const sessions = ctxAllSessions.filter(s => s.materia === ctxSelectedMateria);
        const parts = [];
        for (const s of sessions) {
          const segs = await apiCall('segments', { session_id: s.id });
          parts.push(`SESIÓN (${fmtDate(s.started_at)}):\n${(Array.isArray(segs) ? segs : []).map(g => g.text).join('\n')}`);
        }
        const rows = await apiCall('annotations', { user_id: SESSION.id, materia: ctxSelectedMateria });
        const apuntes = (Array.isArray(rows) ? rows : []).filter(r => r.type !== 'ia');
        apuntes.forEach((a,i) => parts.push(`APUNTE ${i+1} (${fmtDate(a.created_at)}):\n${stripHtml(a.content || '')}`));
        text = parts.join('\n\n---\n\n');
      }

      if (!text || !text.trim()) {
        ctxStatus.textContent = 'Está vacío, no hay contenido.';
        ctxConfirm.disabled = false;
        return;
      }

      // Adjuntar contexto al chat actual
      let c = getCurrentChat();
      if (!c) { newChat(); c = getCurrentChat(); }
      c.context = { label, text: truncate(text) };
      // Opcional: añadir un mensaje oculto con el contexto para que el historial lo incluya
      c.messages.push({ role: 'user', content: `[Contexto adjunto: ${label}]`, hidden: true, ts: Date.now() });
      c.messages.push({ role: 'assistant', content: `Contexto "${label}" cargado.`, hidden: true, ts: Date.now() });
      c.updated_at = new Date().toISOString();
      saveChats();
      renderAll();
      toast(`Contexto adjuntado: ${label}`);
      closeContextModal();
    } catch (err) {
      ctxStatus.textContent = 'Error al preparar el contenido.';
      ctxConfirm.disabled = false;
      console.error(err);
    }
  });

  document.getElementById('contextBtn').addEventListener('click', openContextModal);

  // ──────────────────────────────────────────────────────────────────────────────
  // INICIO
  // ──────────────────────────────────────────────────────────────────────────────
  function init() {
    if (!SESSION.id || !SESSION.password) {
      // Redirigir al login si no hay sesión
      location.href = '/';
      return;
    }
    // Cargar el último chat o crear uno nuevo
    if (chats.length) {
      const sorted = [...chats].sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
      selectChat(sorted[0].id);
    } else {
      newChat();
    }
    document.getElementById('msgInput').focus();
  }

  // Si hay un contexto pendiente desde la URL (como antes)
  function tryAutoContext() {
    try {
      const raw = sessionStorage.getItem('triskl_ia_context');
      if (raw) {
        sessionStorage.removeItem('triskl_ia_context');
        const ctx = JSON.parse(raw);
        if (ctx && (ctx.content || '').trim()) {
          const c = getCurrentChat();
          if (!c) { newChat(); }
          const c2 = getCurrentChat();
          c2.context = { label: ctx.title || 'Contenido adjunto', text: truncate(ctx.content) };
          c2.messages.push({ role: 'user', content: `[Contexto adjunto: ${ctx.title}]`, hidden: true, ts: Date.now() });
          c2.messages.push({ role: 'assistant', content: `Contexto "${ctx.title}" cargado.`, hidden: true, ts: Date.now() });
          saveChats();
          renderAll();
          toast('Contexto cargado automáticamente');
          return true;
        }
      }
    } catch(_) {}
    return false;
  }

  // Esperar a que el DOM esté listo
  document.addEventListener('DOMContentLoaded', () => {
    tryAutoContext();
    init();
  });
</script>
</body>
</html>
