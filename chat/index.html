<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>triskl — asistente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #f8fafc;
      color: #0b1a33;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }
    :focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }

    /* ── Top bar ── */
    .top {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e9edf2;
    }
    .back {
      width: 34px; height: 34px;
      display: grid; place-items: center;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #4a5a72;
      cursor: pointer;
      transition: .15s;
    }
    .back:hover { background: #f0f2f5; color: #0b1a33; }
    .back svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -.3px;
      color: #0b1a33;
    }
    .brand small {
      font-weight: 400;
      font-size: 12px;
      color: #6b7d98;
      letter-spacing: .01em;
    }
    .brand .dot { width: 6px; height: 6px; border-radius: 50%; background: #3b82f6; display: inline-block; }

    .ctx-chip {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #eff6ff;
      color: #1e4f8a;
      border: 1px solid #dbeafe;
      border-radius: 99px;
      padding: 4px 10px 4px 8px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 45%;
      cursor: default;
    }
    .ctx-chip.hide { display: none; }
    .ctx-chip svg { width: 14px; height: 14px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; }

    .top-actions {
      display: flex;
      gap: 2px;
      margin-left: 4px;
    }

    /* ── Thread ── */
    .thread {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 8px;
      background: #f8fafc;
    }
    .thread-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .empty {
      margin: auto;
      text-align: center;
      max-width: 420px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .empty .icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: #eff6ff;
      color: #3b82f6;
      display: grid;
      place-items: center;
      font-size: 24px;
    }
    .empty h1 { font-size: 22px; font-weight: 700; letter-spacing: -.3px; color: #0b1a33; }
    .empty p { font-size: 14px; color: #4a5a72; line-height: 1.6; max-width: 380px; }
    .suggests {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 6px;
    }
    .suggest {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #1e3a5f;
      cursor: pointer;
      font-family: inherit;
      transition: .12s;
    }
    .suggest:hover { background: #eff6ff; border-color: #93b5e8; color: #1e4f8a; }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 100%;
      animation: rise .2s ease;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: #3b82f6;
    }
    .msg.bot .avatar { background: #e2e8f0; color: #1e3a5f; }
    .msg.user .avatar { background: #3b82f6; }

    .msg .body {
      font-size: 14.5px;
      line-height: 1.65;
      color: #0b1a33;
      padding: 10px 14px;
      border-radius: 12px;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      min-width: 0;
    }
    .msg.bot .body {
      background: #ffffff;
      border: 1px solid #e9edf2;
      box-shadow: 0 1px 2px rgba(0,0,0,.02);
    }
    .msg.user {
      flex-direction: row-reverse;
    }
    .msg.user .body {
      background: #3b82f6;
      color: #fff;
    }
    .msg .body.pending {
      color: #6b7d98;
      font-style: italic;
    }
    .msg .body .context-badge {
      display: inline-block;
      background: #eef2f7;
      color: #1e3a5f;
      font-size: 11.5px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 99px;
      margin-bottom: 6px;
    }
    .msg.user .body .context-badge { background: rgba(255,255,255,.2); color: #fff; }

    .msg-attaches {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }
    .msg-attach {
      font-size: 11.5px;
      font-weight: 600;
      background: rgba(255,255,255,.2);
      color: inherit;
      border-radius: 6px;
      padding: 2px 9px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .msg.bot .msg-attach { background: #f1f4f8; color: #2d4058; }

    .save-note {
      align-self: flex-start;
      margin-top: 4px;
      margin-left: 44px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .02em;
      color: #1e4f8a;
      background: #eff6ff;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      padding: 4px 12px;
      cursor: pointer;
      transition: .12s;
      text-transform: uppercase;
    }
    .save-note:hover { background: #dbeafe; }
    .save-note.done { color: #0d7a5e; background: #e6f7f0; border-color: #b8e0d3; cursor: default; }

    .dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }
    .dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6b7d98;
      animation: blink 1.2s infinite both;
      opacity: .3;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100% { opacity: .25; } 40% { opacity: 1; } }

    /* ── Composer ── */
    .composer {
      flex-shrink: 0;
      border-top: 1px solid #e9edf2;
      background: #ffffff;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    }
    .composer-inner {
      max-width: 720px;
      margin: 0 auto;
    }
    .attach-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
      padding: 0 2px;
    }
    .attach-strip:empty { display: none; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f1f4f8;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 4px 8px 4px 10px;
      font-size: 12px;
      font-weight: 500;
      color: #1e3a5f;
      max-width: 220px;
    }
    .chip .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip .x {
      cursor: pointer;
      color: #6b7d98;
      display: grid;
      place-items: center;
      background: none;
      border: none;
      padding: 0;
    }
    .chip .x:hover { color: #dc2626; }
    .chip .x svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }
    .chip.ctx { background: #eff6ff; border-color: #dbeafe; color: #1e4f8a; }

    .row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .icon-btn {
      width: 38px; height: 38px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #ffffff;
      color: #4a5a72;
      cursor: pointer;
      transition: .12s;
    }
    .icon-btn:hover { background: #f1f4f8; color: #0b1a33; border-color: #cbd5e1; }
    .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }

    .field {
      flex: 1;
      display: flex;
      align-items: flex-end;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      background: #f8fafc;
      padding: 4px 4px 4px 14px;
      transition: .12s;
    }
    .field:focus-within { border-color: #3b82f6; background: #ffffff; box-shadow: 0 0 0 3px rgba(59,130,246,.08); }

    textarea {
      flex: 1;
      border: 0;
      outline: 0;
      resize: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      color: #0b1a33;
      line-height: 1.5;
      max-height: 140px;
      padding: 8px 0;
      overflow-y: auto;
    }
    textarea::placeholder { color: #8a9bb0; }

    .send {
      width: 36px; height: 36px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 10px;
      background: #3b82f6;
      color: #fff;
      cursor: pointer;
      transition: .12s;
      margin-left: 4px;
    }
    .send:hover { background: #2563eb; }
    .send:disabled { opacity: .4; cursor: default; }
    .send svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; }

    .hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #8a9bb0;
      text-align: center;
      margin-top: 6px;
      letter-spacing: .02em;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%);
      background: #0b1a33;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 10px;
      z-index: 50;
      animation: rise .2s ease;
      box-shadow: 0 6px 24px rgba(11,26,51,.18);
    }
    .toast.err { background: #dc2626; }

    @media (max-width: 540px) {
      .top { padding: 8px 12px; }
      .brand small { display: none; }
      .ctx-chip { max-width: 30%; font-size: 11px; }
      .msg .body { font-size: 14px; padding: 8px 12px; }
    }

    /* ── Overlay de conversaciones ── */
    .chats-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(11,26,51,.3);
      display: flex;
      justify-content: flex-end;
    }
    .chats-overlay.h { display: none; }
    .chats-panel {
      width: 100%; max-width: 340px; height: 100%;
      background: #ffffff;
      display: flex; flex-direction: column;
      animation: slideIn .2s ease both;
      border-left: 1px solid #e9edf2;
    }
    @keyframes slideIn { from { transform: translateX(16px); opacity: .4; } to { transform: none; opacity: 1; } }
    .chats-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #e9edf2;
      font-weight: 700; font-size: 17px;
      color: #0b1a33;
    }
    .chats-new {
      margin: 12px 16px 4px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: #fff;
      font-weight: 700;
      font-size: 13.5px;
      cursor: pointer;
      font-family: inherit;
      transition: .12s;
    }
    .chats-new:hover { background: #2563eb; }
    .chats-list { flex: 1; overflow-y: auto; padding: 6px 8px; display: flex; flex-direction: column; gap: 2px; }
    .chats-empty { text-align: center; color: #6b7d98; font-size: 13px; padding: 30px 20px; }
    .chat-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: 10px;
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
      font-family: inherit;
    }
    .chat-item:hover, .chat-item.active { background: #f1f4f8; }
    .chat-item-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: #e2e8f0; color: #1e3a5f;
      display: grid; place-items: center; font-weight: 700; font-size: 12px;
    }
    .chat-item-body { flex: 1; min-width: 0; }
    .chat-item-title { font-size: 13.5px; font-weight: 700; color: #0b1a33; display: flex; align-items: center; gap: 6px; }
    .chat-item-title .status { font-size: 9.5px; font-weight: 600; color: #6b7d98; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
    .chat-item-snippet { font-size: 12px; color: #4a5a72; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item-del {
      flex-shrink: 0; border: none; background: transparent; color: #6b7d98; cursor: pointer; padding: 6px;
    }
    .chat-item-del:hover { color: #dc2626; }

    /* ── Selector de contexto simplificado ── */
    .ctx-overlay {
      position: fixed; inset: 0; z-index: 250;
      background: rgba(11,26,51,.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctx-overlay.h { display: none; }
    .ctx-sheet {
      width: 100%; max-width: 440px; max-height: 80vh;
      background: #ffffff;
      border-radius: 16px;
      display: flex; flex-direction: column;
      animation: slideUp .2s ease both;
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .ctx-sheet-header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid #e9edf2;
      font-weight: 700; font-size: 17px;
      color: #0b1a33;
    }
    .ctx-sheet-header span { flex: 1; }
    .ctx-body {
      flex: 1; overflow-y: auto;
      padding: 6px 8px;
    }
    .ctx-footer {
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid #e9edf2;
    }
    .ctx-footer.h { display: none; }

    .ctx-menu-item {
      display: flex; align-items: center; gap: 12px;
      width: 100%; text-align: left;
      padding: 10px 10px;
      border: none; background: none; border-radius: 10px;
      cursor: pointer; font-family: inherit;
      font-size: 13.5px; font-weight: 600; color: #0b1a33;
    }
    .ctx-menu-item:hover { background: #f1f4f8; }
    .ctx-menu-item svg { width: 18px; height: 18px; color: #3b82f6; flex-shrink: 0; stroke: currentColor; stroke-width: 2; fill: none; }
    .ctx-menu-item .lbl small { display: block; font-weight: 400; color: #6b7d98; font-size: 11.5px; margin-top: 1px; }

    .ctx-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
    }
    .ctx-list-item:hover { background: #f1f4f8; }
    .ctx-list-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #3b82f6; flex-shrink: 0; }
    .ctx-list-body { flex: 1; min-width: 0; }
    .ctx-list-title { font-size: 13px; font-weight: 600; color: #0b1a33; }
    .ctx-list-snippet { font-size: 11.5px; color: #4a5a72; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ctx-empty { text-align: center; color: #6b7d98; font-size: 13px; padding: 30px 20px; }

    .back-btn {
      width: 34px; height: 34px;
      display: grid; place-items: center;
      border: none; border-radius: 8px;
      background: transparent;
      color: #4a5a72;
      cursor: pointer;
    }
    .back-btn:hover { background: #f1f4f8; }
    .back-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }

    .ctx-confirm-btn {
      width: 100%; padding: 10px; border: none; border-radius: 10px;
      background: #3b82f6; color: #fff; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: inherit;
    }
    .ctx-confirm-btn:hover { background: #2563eb; }
  </style>
</head>
<body>

  <!-- ─── Top bar ─── -->
  <div class="top">
    <button class="back" id="backBtn" title="Volver">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="brand">
      <span>triskl</span><span class="dot"></span><small>asistente</small>
    </div>
    <div class="ctx-chip hide" id="ctxChip">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span id="ctxLabel">contexto</span>
    </div>
    <div class="top-actions">
      <button class="back" id="finishBtn" title="Finalizar" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      </button>
      <button class="back" id="chatsBtn" title="Conversaciones">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- ─── Panel de conversaciones ─── -->
  <div class="chats-overlay h" id="chatsOverlay">
    <div class="chats-panel">
      <div class="chats-panel-header">
        <span>Conversaciones</span>
        <button class="back" id="closeChatsBtn">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <button class="chats-new" id="newChatBtn">+ Nueva conversación</button>
      <div class="chats-list" id="chatsList">
        <div class="chats-empty">Cargando…</div>
      </div>
    </div>
  </div>

  <!-- ─── Thread ─── -->
  <div class="thread" id="thread">
    <div class="thread-inner" id="threadInner">
      <div class="empty" id="empty">
        <div class="icon">📘</div>
        <h1>¿Qué estudiamos hoy?</h1>
        <p id="emptyText">Podés adjuntar transcripciones, apuntes o archivos de texto para que los use como contexto.</p>
        <div class="suggests" id="suggests"></div>
      </div>
    </div>
  </div>

  <!-- ─── Composer ─── -->
  <div class="composer">
    <div class="composer-inner">
      <div class="attach-strip" id="attachStrip"></div>
      <div class="row">
        <button class="icon-btn" id="attachBtn" title="Agregar contexto">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="field">
          <textarea id="input" rows="1" placeholder="Escribí tu pregunta…"></textarea>
          <button class="send" id="send">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <div class="hint">ENTER para enviar · SHIFT+ENTER salto de línea</div>
    </div>
    <input type="file" id="fileInput" multiple accept=".txt,.md,.csv,text/plain" style="display:none" />
  </div>

  <!-- ─── Selector de contexto ─── -->
  <div class="ctx-overlay h" id="ctxOverlay">
    <div class="ctx-sheet">
      <div class="ctx-sheet-header">
        <button class="back-btn" id="ctxBackBtn" style="display:none;">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span id="ctxTitle">Agregar contexto</span>
        <button class="back-btn" id="ctxCloseBtn">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="ctx-body" id="ctxBody"></div>
      <div class="ctx-footer h" id="ctxFooter">
        <button class="ctx-confirm-btn" id="ctxConfirmBtn">Agregar seleccionados</button>
      </div>
    </div>
  </div>

  <script>
    // ──────────────────────────────────────────────────────────────
    // CONFIGURACIÓN
    // ──────────────────────────────────────────────────────────────
    const API = '/api/handler';
    const CHAT_API = '/api/chat';
    const LS = 'triskl_session';

    let SESSION = null;
    try { SESSION = JSON.parse(localStorage.getItem(LS)); } catch (_) { SESSION = null; }
    if (!SESSION?.id) { location.href = '/'; }

    function _auth() {
      return { uuid: SESSION?.id || SESSION?.uuid || null, username: SESSION?.username || null, password: SESSION?.password || '' };
    }

    // ── Parseo de URL ──
    function parseDoc() {
      const raw = location.search.replace(/^\?/, '');
      if (!raw) return { id: null, type: null };
      const parts = raw.split('?');
      const id = decodeURIComponent(parts[0] || '') || null;
      let type = null;
      for (let i = 1; i < parts.length; i++) {
        const m = parts[i].match(/type=([^&?]+)/);
        if (m) { type = decodeURIComponent(m[1]); break; }
      }
      return { id, type };
    }
    const DOC = parseDoc();

    // ── Estado ──
    let conversation = [];
    let contextBlocks = [];        // { id, label, text }
    let materia = null;
    let sending = false;
    let currentChatId = null;

    // ── DOM ──
    const threadEl = document.getElementById('thread');
    const innerEl = document.getElementById('threadInner');
    const inputEl = document.getElementById('input');
    const sendEl = document.getElementById('send');
    const stripEl = document.getElementById('attachStrip');
    const ctxChip = document.getElementById('ctxChip');
    const ctxLabel = document.getElementById('ctxLabel');
    const chatsBtn = document.getElementById('chatsBtn');
    const chatsOverlay = document.getElementById('chatsOverlay');
    const chatsList = document.getElementById('chatsList');
    const closeChatsBtn = document.getElementById('closeChatsBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const finishBtn = document.getElementById('finishBtn');
    const backBtn = document.getElementById('backBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');

    // ── Helpers ──
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function toast(msg, type = 'ok') {
      const el = document.createElement('div');
      el.className = 'toast' + (type === 'err' ? ' err' : '');
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2200);
    }

    async function apiPOST(action, body) {
      try {
        const res = await fetch(`${API}?action=${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ..._auth(), ...(body || {}) })
        });
        return await res.json().catch(() => ({}));
      } catch (_) { return {}; }
    }
    async function apiGET(action, params) {
      try {
        const res = await fetch(`${API}?action=${action}${params ? '&' + params : ''}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(_auth())
        });
        return await res.json().catch(() => []);
      } catch (_) { return []; }
    }
    async function chatPOST(action, body) {
      try {
        const res = await fetch(`${CHAT_API}?action=${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ..._auth(), ...(body || {}) })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) return { error: data.error || `HTTP ${res.status}` };
        return data;
      } catch (e) { return { error: e.message }; }
    }

    // ── Conversaciones ──
    function fmtChatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso), now = new Date();
      return d.toDateString() === now.toDateString()
        ? d.toLocaleTimeString('es-UY', { hour:'2-digit', minute:'2-digit' })
        : d.toLocaleDateString('es-UY', { day:'2-digit', month:'2-digit' });
    }

    function updateFinishBtnVisibility() {
      finishBtn.style.display = currentChatId ? 'grid' : 'none';
    }

    function openChatsPanel() { chatsOverlay.classList.remove('h'); loadChatsList(); }
    function closeChatsPanel() { chatsOverlay.classList.add('h'); }
    chatsBtn.addEventListener('click', openChatsPanel);
    closeChatsBtn.addEventListener('click', closeChatsPanel);
    chatsOverlay.addEventListener('click', e => { if (e.target === chatsOverlay) closeChatsPanel(); });
    backBtn.addEventListener('click', () => { location.href = '/'; });

    async function loadChatsList() {
      chatsList.innerHTML = '<div class="chats-empty">Cargando…</div>';
      const chats = await chatPOST('ai-chats-list', {});
      if (!Array.isArray(chats) || !chats.length) {
        chatsList.innerHTML = '<div class="chats-empty">No hay conversaciones aún.</div>';
        return;
      }
      chatsList.innerHTML = '';
      chats.forEach(c => {
        const item = document.createElement('button');
        item.className = 'chat-item' + (c.id === currentChatId ? ' active' : '');
        item.innerHTML = `
          <div class="chat-item-avatar">📘</div>
          <div class="chat-item-body">
            <div class="chat-item-title">${esc(c.title || c.materia || 'Conversación')}<span class="status">${c.closed_at ? '· finalizada' : '· activa'}</span></div>
            <div class="chat-item-snippet">${esc(c.last_message || 'Sin mensajes')} · ${fmtChatDate(c.updated_at)}</div>
          </div>
          <span class="chat-item-del" data-del="${c.id}">
            <svg viewBox="0 0 24 24" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </span>`;
        item.querySelector('[data-del]').addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm('¿Eliminar?')) return;
          await chatPOST('ai-chat-delete', { chat_id: c.id });
          if (c.id === currentChatId) startFreshChat();
          loadChatsList();
        });
        item.addEventListener('click', () => openChatById(c.id));
        chatsList.appendChild(item);
      });
    }

    async function openChatById(chatId) {
      const data = await chatPOST('ai-chat-open', { chat_id: chatId });
      if (!data || data.error || !data.chat) { toast('No se pudo abrir', 'err'); return; }
      currentChatId = data.chat.id;
      materia = data.chat.materia || materia;
      conversation.length = 0;
      innerEl.innerHTML = '';
      (data.messages || []).forEach(m => {
        appendMsg(m.role === 'user' ? 'user' : 'bot', m.content);
        conversation.push({ role: m.role, content: m.content });
      });
      updateFinishBtnVisibility();
      closeChatsPanel();
    }

    function startFreshChat() {
      currentChatId = null;
      conversation.length = 0;
      innerEl.innerHTML = `<div class="empty" id="empty"><div class="icon">📘</div><h1>¿Qué estudiamos hoy?</h1><p id="emptyText"></p><div class="suggests" id="suggests"></div></div>`;
      renderSuggests();
      updateFinishBtnVisibility();
      closeChatsPanel();
    }
    newChatBtn.addEventListener('click', startFreshChat);

    finishBtn.addEventListener('click', async () => {
      if (!currentChatId) return;
      await chatPOST('ai-chat-finish', { chat_id: currentChatId });
      toast('Conversación finalizada');
      startFreshChat();
    });

    // ── Cargar contexto desde URL (transcripción) ──
    async function loadDocContext() {
      if (!DOC.id) { renderSuggests(); return; }
      const isTrans = !DOC.type || /transcrip/i.test(DOC.type);
      if (isTrans) {
        const segs = await apiGET('segments', `session_id=${encodeURIComponent(DOC.id)}`);
        if (Array.isArray(segs) && segs.length) {
          const text = segs.map(s => s.text).filter(Boolean).join('\n');
          let label = 'Transcripción cargada';
          try {
            const sessions = await apiGET('sessions', `username=${encodeURIComponent(SESSION.username || '')}`);
            const found = (sessions || []).find(s => s.id === DOC.id);
            if (found?.materia) { materia = found.materia; label = found.materia; }
          } catch (_) {}
          addContextBlock(label, text);
        }
      }
      renderSuggests();
    }

    function renderSuggests() {
      const box = document.getElementById('suggests');
      const withCtx = contextBlocks.length > 0;
      const emptyText = document.getElementById('emptyText');
      if (emptyText) emptyText.textContent = withCtx
        ? 'Material cargado. Preguntame sobre la clase, pedí un resumen o un esquema.'
        : 'Podés adjuntar transcripciones, apuntes o archivos de texto para que los use como contexto.';
      const ideas = withCtx
        ? ['Resumí los puntos clave', 'Hacé 5 preguntas de repaso', 'Explicá lo más difícil']
        : ['Explicá un tema paso a paso', 'Ayudame a organizar mi estudio', 'Hacé un esquema'];
      box.innerHTML = '';
      ideas.forEach(t => {
        const b = document.createElement('button');
        b.className = 'suggest'; b.textContent = t;
        b.addEventListener('click', () => { inputEl.value = t; inputEl.focus(); autoGrow(); });
        box.appendChild(b);
      });
    }

    // ── Contexto ──
    function addContextBlock(label, text) {
      contextBlocks.push({ id: crypto.randomUUID ? crypto.randomUUID() : String(Math.random()), label, text });
      renderStrip();
      refreshCtxChip();
    }

    function removeContextBlock(id) {
      contextBlocks = contextBlocks.filter(b => b.id !== id);
      renderStrip();
      refreshCtxChip();
    }

    function combinedContextText() {
      if (!contextBlocks.length) return '';
      return contextBlocks.map(b => `### ${b.label}\n${b.text}`).join('\n\n');
    }

    function refreshCtxChip() {
      if (!contextBlocks.length) { ctxChip.classList.add('hide'); return; }
      ctxLabel.textContent = contextBlocks.length === 1 ? contextBlocks[0].label : `${contextBlocks.length} fuentes`;
      ctxChip.classList.remove('hide');
      renderSuggests();
    }

    function renderStrip() {
      stripEl.innerHTML = '';
      contextBlocks.forEach(b => {
        const chip = document.createElement('div');
        chip.className = 'chip ctx';
        chip.innerHTML = `<span class="name">📄 ${esc(b.label)}</span><button class="x" data-ctx="${b.id}"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
        chip.querySelector('.x').addEventListener('click', () => removeContextBlock(b.id));
        stripEl.appendChild(chip);
      });
    }

    // ── Archivos de texto ──
    fileInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files || []);
      for (const f of files) {
        try {
          const text = await f.text();
          addContextBlock(f.name, text);
        } catch (_) { toast('No se pudo leer el archivo', 'err'); }
      }
      e.target.value = '';
    });

    // ── Selector de contexto (simplificado: solo transcripciones y apuntes) ──
    const ctxOverlay = document.getElementById('ctxOverlay');
    const ctxBody = document.getElementById('ctxBody');
    const ctxTitle = document.getElementById('ctxTitle');
    const ctxBackBtn = document.getElementById('ctxBackBtn');
    const ctxCloseBtn = document.getElementById('ctxCloseBtn');
    const ctxFooter = document.getElementById('ctxFooter');
    const ctxConfirmBtn = document.getElementById('ctxConfirmBtn');

    let ctxNavStack = [];
    let ctxAllSessions = null;
    let ctxAllAnnotations = null;

    function stripHtml(html) {
      const d = document.createElement('div');
      d.innerHTML = String(html || '');
      return (d.textContent || d.innerText || '').trim();
    }

    async function ensureCtxData() {
      if (ctxAllSessions === null) {
        ctxAllSessions = await apiGET('sessions', `username=${encodeURIComponent(SESSION.username || '')}`);
        if (!Array.isArray(ctxAllSessions)) ctxAllSessions = [];
      }
      if (ctxAllAnnotations === null) {
        ctxAllAnnotations = await apiGET('all-annotations', `user_id=${encodeURIComponent(SESSION.id)}`);
        if (!Array.isArray(ctxAllAnnotations)) ctxAllAnnotations = [];
      }
    }

    function materiasDisponibles() {
      const set = new Set();
      (ctxAllSessions || []).forEach(s => { if (s.materia) set.add(s.materia); });
      (ctxAllAnnotations || []).forEach(a => { if (a.materia) set.add(a.materia); });
      return [...set].sort();
    }

    function openCtxMenu() {
      ctxNavStack = [];
      renderCtxMenuView();
      ctxOverlay.classList.remove('h');
    }
    attachBtn.addEventListener('click', openCtxMenu);

    function closeCtxOverlay() { ctxOverlay.classList.add('h'); }
    ctxCloseBtn.addEventListener('click', closeCtxOverlay);
    ctxOverlay.addEventListener('click', e => { if (e.target === ctxOverlay) closeCtxOverlay(); });

    ctxBackBtn.addEventListener('click', () => {
      const prev = ctxNavStack.pop();
      if (prev) prev(); else closeCtxOverlay();
    });

    function setCtxView(title, bodyHtml, { showBack = false, footer = false } = {}) {
      ctxTitle.textContent = title;
      ctxBackBtn.style.display = showBack ? 'grid' : 'none';
      ctxBody.innerHTML = bodyHtml;
      ctxFooter.classList.toggle('h', !footer);
    }

    function renderCtxMenuView() {
      setCtxView('Agregar contexto', '', { showBack: false });
      const items = [
        { icon: 'M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11',
          lbl: 'Subir archivo de texto', sub: '.txt, .md, .csv', action: () => { closeCtxOverlay(); fileInput.click(); } },
        { icon: 'M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zM19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8',
          lbl: 'Transcripción', sub: 'Elegí una de una materia', action: () => goMateriaPicker('trans') },
        { icon: 'M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z',
          lbl: 'Apunte', sub: 'Elegí uno de una materia', action: () => goMateriaPicker('apunte') },
        { icon: 'M2 3h20v14H2zM8 21h8M12 17v4',
          lbl: 'Todo mi material', sub: 'Todas las materias', action: () => addTodoMaterial() },
      ];
      ctxBody.innerHTML = items.map((it, i) => `
        <button class="ctx-menu-item" data-i="${i}">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="${it.icon}"/></svg>
          <span class="lbl">${esc(it.lbl)}<small>${esc(it.sub)}</small></span>
        </button>
      `).join('');
      [...ctxBody.querySelectorAll('.ctx-menu-item')].forEach((el, i) => el.addEventListener('click', items[i].action));
    }

    async function goMateriaPicker(mode) {
      setCtxView('Elegí la materia', '<div class="ctx-empty">Cargando…</div>', { showBack: true });
      ctxNavStack.push(renderCtxMenuView);
      await ensureCtxData();
      const materias = materiasDisponibles();
      if (!materias.length) {
        setCtxView('Elegí la materia', '<div class="ctx-empty">No tenés material guardado.</div>', { showBack: true });
        return;
      }
      ctxBody.innerHTML = materias.map((m, i) => `<button class="ctx-menu-item" data-i="${i}"><span class="lbl">${esc(m)}</span></button>`).join('');
      [...ctxBody.querySelectorAll('.ctx-menu-item')].forEach((el, i) => el.addEventListener('click', () => onMateriaChosen(mode, materias[i])));
    }

    async function onMateriaChosen(mode, materia_) {
      const isTrans = mode === 'trans';
      const items = isTrans
        ? (ctxAllSessions || []).filter(s => s.materia === materia_)
        : (ctxAllAnnotations || []).filter(a => a.materia === materia_);
      renderItemsView(mode, materia_, items, isTrans);
    }

    function renderItemsView(mode, materia_, items, isTrans) {
      ctxNavStack.push(() => goMateriaPicker(mode));
      const title = isTrans ? `Transcripciones — ${materia_}` : `Apuntes — ${materia_}`;
      if (!items.length) {
        setCtxView(title, `<div class="ctx-empty">No hay ${isTrans ? 'transcripciones' : 'apuntes'} en esta materia.</div>`, { showBack: true });
        return;
      }
      setCtxView(title, '', { showBack: true, footer: true });
      ctxBody.innerHTML = items.map((it, i) => {
        const label = isTrans
          ? `Transcripción del ${new Date(it.started_at).toLocaleDateString('es-UY')}`
          : (it.type === 'nota' ? 'Nota' : 'Apunte') + ` · ${new Date(it.created_at).toLocaleDateString('es-UY')}`;
        const snippet = isTrans ? '' : stripHtml(it.content).slice(0, 70);
        return `<label class="ctx-list-item">
          <input type="checkbox" name="ctxItem" data-i="${i}" />
          <div class="ctx-list-body">
            <div class="ctx-list-title">${esc(label)}</div>
            ${snippet ? `<div class="ctx-list-snippet">${esc(snippet)}</div>` : ''}
          </div>
        </label>`;
      }).join('');

      ctxConfirmBtn.onclick = async () => {
        const checked = [...ctxBody.querySelectorAll('input[name="ctxItem"]:checked')].map(el => items[+el.dataset.i]);
        if (!checked.length) { closeCtxOverlay(); return; }
        for (const it of checked) {
          if (isTrans) {
            const segs = await apiGET('segments', `session_id=${encodeURIComponent(it.id)}`);
            const text = (segs || []).map(s => s.text).filter(Boolean).join('\n');
            addContextBlock(`Transcripción · ${materia_} · ${new Date(it.started_at).toLocaleDateString('es-UY')}`, text || '(vacía)');
          } else {
            addContextBlock(`Apunte · ${materia_} · ${new Date(it.created_at).toLocaleDateString('es-UY')}`, stripHtml(it.content));
          }
        }
        toast(`${checked.length} ${isTrans ? 'transcripciones' : 'apuntes'} agregados`);
        closeCtxOverlay();
      };
    }

    async function addTodoMaterial() {
      setCtxView('Todo mi material', '<div class="ctx-empty">Cargando…</div>', { showBack: false });
      await ensureCtxData();
      let count = 0;
      for (const s of (ctxAllSessions || [])) {
        const segs = await apiGET('segments', `session_id=${encodeURIComponent(s.id)}`);
        const text = (segs || []).map(x => x.text).filter(Boolean).join('\n');
        if (text) { addContextBlock(`Transcripción · ${s.materia || 'Sin materia'} · ${new Date(s.started_at).toLocaleDateString('es-UY')}`, text); count++; }
      }
      (ctxAllAnnotations || []).forEach(a => {
        addContextBlock(`Apunte · ${a.materia || 'Sin materia'} · ${new Date(a.created_at).toLocaleDateString('es-UY')}`, stripHtml(a.content));
        count++;
      });
      toast(`Se agregaron ${count} elementos como contexto`);
      closeCtxOverlay();
    }

    // ── Render de mensajes ──
    function appendMsg(role, text, pending) {
      const empty = document.getElementById('empty');
      if (empty && empty.parentNode) empty.remove();
      const wrap = document.createElement('div');
      wrap.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
      const avatar = role === 'user' ? (SESSION.username || 'Vos')[0].toUpperCase() : '📘';
      const bodyClass = pending ? 'body pending' : 'body';
      wrap.innerHTML = `<div class="avatar">${avatar}</div><div class="${bodyClass}">${pending ? '<span class="dots"><span></span><span></span><span></span></span>' : esc(text)}</div>`;
      innerEl.appendChild(wrap);
      threadEl.scrollTop = threadEl.scrollHeight;
      return wrap;
    }

    function addSaveButton(afterEl, question, answer) {
      if (!materia) return;
      const btn = document.createElement('button');
      btn.className = 'save-note';
      btn.textContent = 'Guardar como apunte';
      btn.addEventListener('click', async () => {
        const content = `<p><strong>Pregunta:</strong> ${esc(question)}</p><p><strong>Respuesta:</strong> ${esc(answer)}</p>`;
        const r = await apiPOST('create-annotation', {
          user_id: SESSION.id, username: SESSION.username, materia,
          type: 'nota', content, source_session_id: DOC.id || null
        });
        if (r && (r.ok || r.annotation)) {
          btn.textContent = '✓ Guardado'; btn.classList.add('done');
        } else { toast('No se pudo guardar', 'err'); }
      });
      afterEl.insertAdjacentElement('afterend', btn);
    }

    // ── Enviar ──
    async function send() {
      if (sending) return;
      const question = inputEl.value.trim();
      if (!question && !contextBlocks.length) return;

      // Mostrar mensaje del usuario con badges de contexto
      const contextLabels = contextBlocks.map(b => b.label);
      let displayText = question || '(con material adjunto)';
      const msgWrap = appendMsg('user', displayText, false);
      // agregar badges de contexto dentro del mensaje
      if (contextLabels.length) {
        const badges = contextLabels.map(l => `<span class="msg-attach">📄 ${esc(l)}</span>`).join('');
        const body = msgWrap.querySelector('.body');
        body.innerHTML = esc(displayText) + `<div class="msg-attaches">${badges}</div>`;
      }

      inputEl.value = ''; autoGrow();

      const ctxText = combinedContextText();
      const ctxSnapshot = [...contextBlocks];
      contextBlocks = []; renderStrip(); refreshCtxChip();

      conversation.push({ role: 'user', content: question });
      const pendingEl = appendMsg('bot', '', true);
      sending = true; sendEl.disabled = true;

      const r = await chatPOST('ai-chat', {
        chat_id: currentChatId,
        message: question || 'Analizá el material adjunto.',
        contextText: ctxText || undefined,
        materia: materia || undefined
      });

      if (r && r.error) {
        const body = pendingEl.querySelector('.body');
        body.classList.remove('pending');
        body.textContent = '⚠️ ' + r.error;
        toast('Error en la consulta', 'err');
        sending = false; sendEl.disabled = false;
        return;
      }

      currentChatId = r.chat_id || currentChatId;
      updateFinishBtnVisibility();

      const answer = (r && (r.response || r.reply)) || '⚠️ No pude obtener respuesta. Probá de nuevo.';
      conversation.push({ role: 'assistant', content: answer });

      const body = pendingEl.querySelector('.body');
      body.classList.remove('pending');
      body.textContent = answer;

      addSaveButton(pendingEl, question, answer);

      sending = false; sendEl.disabled = false;
      threadEl.scrollTop = threadEl.scrollHeight;
    }

    sendEl.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    function autoGrow() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    }
    inputEl.addEventListener('input', autoGrow);

    // ── Init ──
    loadDocContext();
    updateFinishBtnVisibility();
    setTimeout(() => inputEl.focus(), 200);
  </script>
</body>
</html>
