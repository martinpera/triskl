<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>triskl — asistente</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --card: #ffffff;
    --soft-bg: #f6f6f7;
    --line: #ececee;
    --line-hi: #dcdce0;
    --ink: #131314;
    --ink-2: #5b5b62;
    --muted: #94949c;
    --ia: #5b3df5;
    --ia-soft: rgba(91,61,245,.09);
    --red: #e5342b;          /* acento de marca */
    --gold: #b07500;
    --f: 'Inter', system-ui, -apple-system, sans-serif;
    --maxw: 760px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--f);
    display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
  }
  :focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* ── Top bar ── */
  .top {
    flex-shrink: 0; display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--bg);
  }
  .back {
    width: 34px; height: 34px; flex-shrink: 0; display: grid; place-items: center;
    border: 1px solid var(--line); border-radius: 10px; background: var(--bg);
    color: var(--ink-2); cursor: pointer; transition: .12s;
  }
  .back:hover { background: var(--soft-bg); color: var(--ink); }
  .back svg { width: 18px; height: 18px; }
  .brand { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .brand-dot { width: 9px; height: 9px; border-radius: 3px; background: var(--red); flex-shrink: 0; }
  .brand-name { font-size: 16px; font-weight: 900; letter-spacing: -.5px; }
  .brand-sub { font-size: 12px; color: var(--muted); font-weight: 600; }
  .ctx-chip {
    margin-left: auto; display: inline-flex; align-items: center; gap: 6px; max-width: 46%;
    background: var(--ia-soft); color: var(--ia); border: 1px solid rgba(91,61,245,.18);
    border-radius: 99px; padding: 5px 11px; font-size: 12px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ctx-chip svg { width: 13px; height: 13px; flex-shrink: 0; }
  .ctx-chip.hide { display: none; }

  /* ── Thread ── */
  .thread {
    flex: 1; overflow-y: auto; padding: 22px 16px 8px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .thread-inner { width: 100%; max-width: var(--maxw); margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .thread::-webkit-scrollbar { width: 8px; }
  .thread::-webkit-scrollbar-thumb { background: var(--line-hi); border-radius: 4px; }

  .empty {
    margin: auto; text-align: center; max-width: 420px; padding: 20px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .empty-badge {
    width: 52px; height: 52px; border-radius: 15px; display: grid; place-items: center;
    background: var(--ia-soft); color: var(--ia);
  }
  .empty-badge svg { width: 26px; height: 26px; }
  .empty h1 { font-size: 19px; font-weight: 800; letter-spacing: -.3px; }
  .empty p { font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }
  .suggests { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
  .suggest {
    background: var(--soft-bg); border: 1px solid var(--line); border-radius: 99px;
    padding: 8px 14px; font-size: 12.5px; font-weight: 600; color: var(--ink-2);
    cursor: pointer; font-family: var(--f); transition: .12s;
  }
  .suggest:hover { background: var(--line); color: var(--ink); }

  .msg { display: flex; gap: 10px; max-width: 100%; animation: rise .22s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .msg .avatar {
    width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0; display: grid; place-items: center;
    font-size: 13px; font-weight: 800;
  }
  .msg.bot .avatar { background: var(--ia); color: #fff; }
  .msg.user .avatar { background: var(--ink); color: #fff; }
  .msg .body {
    font-size: 14.5px; line-height: 1.6; color: var(--ink);
    padding: 10px 14px; border-radius: 13px; word-wrap: break-word; overflow-wrap: anywhere;
    white-space: pre-wrap;
  }
  .msg.bot .body { background: var(--soft-bg); border-top-left-radius: 4px; }
  .msg.user { flex-direction: row-reverse; }
  .msg.user .body { background: var(--ia); color: #fff; border-top-right-radius: 4px; }
  .msg .body.pending { color: var(--muted); font-style: italic; }
  .msg-attaches { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .msg-attach {
    font-size: 11.5px; font-weight: 600; background: rgba(255,255,255,.18); color: inherit;
    border-radius: 7px; padding: 3px 8px; display: inline-flex; align-items: center; gap: 4px;
  }
  .msg.bot .msg-attach { background: var(--line); color: var(--ink-2); }
  .save-note {
    align-self: flex-start; margin-top: 4px; margin-left: 40px;
    font-size: 12px; font-weight: 600; color: var(--ia); background: var(--ia-soft);
    border: 1px solid rgba(91,61,245,.18); border-radius: 8px; padding: 4px 10px;
    cursor: pointer; font-family: var(--f); transition: .12s;
  }
  .save-note:hover { background: rgba(91,61,245,.16); }
  .save-note.done { color: var(--gold); background: rgba(176,117,0,.08); border-color: rgba(176,117,0,.2); cursor: default; }

  /* typing dots */
  .dots { display: inline-flex; gap: 4px; align-items: center; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite both; }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }

  /* ── Composer ── */
  .composer { flex-shrink: 0; border-top: 1px solid var(--line); background: var(--bg); padding: 10px 16px calc(10px + env(safe-area-inset-bottom)); }
  .composer-inner { width: 100%; max-width: var(--maxw); margin: 0 auto; }
  .attach-strip { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .attach-strip:empty { display: none; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px; background: var(--soft-bg);
    border: 1px solid var(--line); border-radius: 9px; padding: 5px 8px 5px 10px;
    font-size: 12px; font-weight: 600; color: var(--ink-2); max-width: 220px;
  }
  .chip .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip .x { cursor: pointer; color: var(--muted); display: grid; place-items: center; }
  .chip .x:hover { color: var(--red); }
  .chip .x svg { width: 13px; height: 13px; }
  .row { display: flex; align-items: flex-end; gap: 8px; }
  .icon-btn {
    width: 42px; height: 42px; flex-shrink: 0; display: grid; place-items: center;
    border: 1px solid var(--line); border-radius: 12px; background: var(--bg);
    color: var(--ink-2); cursor: pointer; transition: .12s;
  }
  .icon-btn:hover { background: var(--soft-bg); color: var(--ink); }
  .icon-btn svg { width: 19px; height: 19px; }
  .field {
    flex: 1; display: flex; align-items: flex-end;
    border: 1px solid var(--line-hi); border-radius: 14px; background: var(--bg);
    padding: 4px 4px 4px 14px; transition: .12s;
  }
  .field:focus-within { border-color: var(--ia); }
  textarea {
    flex: 1; border: 0; outline: 0; resize: none; background: transparent;
    font-family: var(--f); font-size: 14.5px; color: var(--ink); line-height: 1.5;
    max-height: 140px; padding: 8px 0; overflow-y: auto;
  }
  textarea::placeholder { color: var(--muted); }
  .send {
    width: 38px; height: 38px; flex-shrink: 0; display: grid; place-items: center;
    border: 0; border-radius: 11px; background: var(--ia); color: #fff; cursor: pointer;
    transition: .12s; margin-left: 4px;
  }
  .send:hover { background: #4930d6; }
  .send:disabled { opacity: .4; cursor: default; }
  .send svg { width: 18px; height: 18px; }
  .hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 7px; }

  .toast {
    position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%);
    background: var(--ink); color: #fff; font-size: 13px; font-weight: 600;
    padding: 10px 16px; border-radius: 11px; z-index: 50; animation: rise .2s ease;
  }
  .toast.err { background: var(--red); }

  @media (max-width: 560px) {
    .brand-sub { display: none; }
    .ctx-chip { max-width: 40%; }
  }
</style>
</head>
<body>

  <div class="top">
    <button class="back" id="backBtn" title="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="brand">
      <span class="brand-dot"></span>
      <div>
        <div class="brand-name">triskl</div>
        <div class="brand-sub">asistente de estudio</div>
      </div>
    </div>
    <div class="ctx-chip hide" id="ctxChip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span id="ctxLabel">Sin material</span>
    </div>
  </div>

  <div class="thread" id="thread">
    <div class="thread-inner" id="threadInner">
      <div class="empty" id="empty">
        <div class="empty-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3l1.9 4.6L18.5 9.5 13.9 11.4 12 16l-1.9-4.6L5.5 9.5l4.6-1.9z"/></svg>
        </div>
        <h1>Preguntame lo que quieras</h1>
        <p id="emptyText">Puedo explicarte la clase, resumir, armar un esquema o hacerte preguntas de repaso. Adjuntá apuntes, PDFs o imágenes cuando lo necesites.</p>
        <div class="suggests" id="suggests"></div>
      </div>
    </div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <div class="attach-strip" id="attachStrip"></div>
      <div class="row">
        <button class="icon-btn" id="attachBtn" title="Adjuntar archivo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <div class="field">
          <textarea id="input" rows="1" placeholder="Escribí tu pregunta…"></textarea>
          <button class="send" id="send" title="Enviar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <div class="hint">Enter para enviar · Shift+Enter para salto de línea</div>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*,application/pdf,.txt,.md,.csv" style="display:none" />
  </div>

<script>
  const API = '/api/handler';
  const LS  = 'triskl_session';

  // ── Sesión ──
  let SESSION = null;
  try { SESSION = JSON.parse(localStorage.getItem(LS)); } catch (_) { SESSION = null; }
  if (!SESSION?.id) { location.href = '/'; }

  function _auth() { return { uuid: SESSION?.id || SESSION?.uuid || null, username: SESSION?.username || null, password: SESSION?.password || '' }; }

  // ── Parseo de URL estilo /chat?<id>?type=doc  (NUNCA /chat/) ──
  function parseDoc() {
    const raw = location.search.replace(/^\?/, '');   // "<id>?type=doc"
    if (!raw) return { id: null, type: null };
    const parts = raw.split('?');
    const id = decodeURIComponent(parts[0] || '') || null;
    let type = null;
    for (let i = 1; i < parts.length; i++) {
      const m = parts[i].match(/type=([^&?]+)/);
      if (m) { type = decodeURIComponent(m[1]); break; }
    }
    return { id, type };
  }
  const DOC = parseDoc();

  // ── Estado del chat ──
  const conversation = [];   // [{role, content}]
  let attachments = [];      // [{name, media_type, data(base64)}] pdf/img
  let contextText = '';      // material de texto (transcripción, apuntes, .txt)
  let contextLabel = '';     // etiqueta legible del material cargado
  let materia = null;        // si lo resolvemos desde la sesión/transcripción
  let sending = false;

  // ── Helpers de red (uuid + password en cada request) ──
  async function apiPOST(action, body) {
    try {
      const res = await fetch(`${API}?action=${action}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ..._auth(), ...(body || {}) })
      });
      return await res.json().catch(() => ({}));
    } catch (_) { return {}; }
  }
  async function apiGET(action, params) {
    try {
      const res = await fetch(`${API}?action=${action}${params ? '&' + params : ''}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(_auth())
      });
      return await res.json().catch(() => []);
    } catch (_) { return []; }
  }

  // ── DOM refs ──
  const threadEl  = document.getElementById('thread');
  const innerEl   = document.getElementById('threadInner');
  const emptyEl   = document.getElementById('empty');
  const inputEl   = document.getElementById('input');
  const sendEl    = document.getElementById('send');
  const stripEl   = document.getElementById('attachStrip');
  const ctxChip   = document.getElementById('ctxChip');
  const ctxLabel  = document.getElementById('ctxLabel');

  document.getElementById('backBtn').addEventListener('click', () => { location.href = '/'; });

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function toast(msg, type = 'ok') {
    const el = document.createElement('div');
    el.className = 'toast' + (type === 'err' ? ' err' : '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }

  // ── Cargar material del documento (si vino por URL) ──
  async function loadDocContext() {
    if (!DOC.id) { renderSuggests(); return; }
    const isTranscripcion = !DOC.type || /transcrip/i.test(DOC.type);

    if (isTranscripcion) {
      const segs = await apiGET('segments', `session_id=${encodeURIComponent(DOC.id)}`);
      if (Array.isArray(segs) && segs.length) {
        contextText = segs.map(s => s.text).filter(Boolean).join('\n');
        contextLabel = 'Transcripción cargada';
        // intentar resolver la materia desde las sesiones del usuario
        try {
          const sessions = await apiGET('sessions', `username=${encodeURIComponent(SESSION.username || '')}`);
          const found = (sessions || []).find(s => s.id === DOC.id);
          if (found?.materia) { materia = found.materia; contextLabel = found.materia; }
        } catch (_) {}
      } else {
        contextLabel = 'Documento vacío';
      }
    } else {
      // doc / apunte: lo tomamos como material si trae contenido accesible
      contextLabel = 'Documento cargado';
    }

    if (contextLabel) { ctxLabel.textContent = contextLabel; ctxChip.classList.remove('hide'); }
    renderSuggests();
  }

  function renderSuggests() {
    const box = document.getElementById('suggests');
    const withCtx = !!contextText;
    document.getElementById('emptyText').textContent = withCtx
      ? 'Tengo el material cargado. Preguntame sobre la clase, pedí un resumen o un esquema.'
      : 'Puedo explicarte temas, resumir, armar esquemas o hacerte preguntas de repaso. Adjuntá apuntes, PDFs o imágenes cuando quieras.';
    const ideas = withCtx
      ? ['Resumí los puntos clave', 'Hacé 5 preguntas de repaso', 'Explicá lo más difícil']
      : ['Explicá un tema paso a paso', 'Ayudame a organizar mi estudio', 'Hacé un esquema de un tema'];
    box.innerHTML = '';
    ideas.forEach(t => {
      const b = document.createElement('button');
      b.className = 'suggest'; b.textContent = t;
      b.addEventListener('click', () => { inputEl.value = t; inputEl.focus(); autoGrow(); });
      box.appendChild(b);
    });
  }

  // ── Adjuntar archivos ──
  document.getElementById('attachBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    for (const f of files) await addFile(f);
    e.target.value = '';
    renderStrip();
  });

  function readAsBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(String(r.result).split(',')[1] || '');
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }
  function readAsText(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(String(r.result || ''));
      r.onerror = rej;
      r.readAsText(file);
    });
  }

  async function addFile(file) {
    const mt = file.type || '';
    if (mt.startsWith('image/') || mt === 'application/pdf') {
      const data = await readAsBase64(file);
      attachments.push({ name: file.name, media_type: mt, data });
    } else {
      // texto: lo sumamos al contexto
      const txt = await readAsText(file);
      contextText += (contextText ? '\n\n' : '') + `### ${file.name}\n${txt}`;
      attachments.push({ name: file.name, media_type: 'text/plain', _textOnly: true });
      if (!contextLabel) { contextLabel = 'Material adjunto'; ctxLabel.textContent = contextLabel; ctxChip.classList.remove('hide'); }
    }
  }

  function renderStrip() {
    stripEl.innerHTML = '';
    attachments.forEach((a, i) => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = `<span class="name">${esc(a.name)}</span><span class="x" data-i="${i}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>`;
      chip.querySelector('.x').addEventListener('click', () => { attachments.splice(i, 1); renderStrip(); });
      stripEl.appendChild(chip);
    });
  }

  // ── Render de mensajes ──
  function appendMsg(role, text, attachNames, pending) {
    if (emptyEl && emptyEl.parentNode) emptyEl.remove();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
    const av = role === 'user' ? (SESSION.username || 'Vos')[0].toUpperCase() : 'IA';
    let attachHtml = '';
    if (attachNames && attachNames.length) {
      attachHtml = `<div class="msg-attaches">${attachNames.map(n => `<span class="msg-attach">📎 ${esc(n)}</span>`).join('')}</div>`;
    }
    wrap.innerHTML = `<div class="avatar">${esc(av)}</div><div class="body${pending ? ' pending' : ''}">${pending ? '<span class="dots"><span></span><span></span><span></span></span>' : esc(text) + attachHtml}</div>`;
    innerEl.appendChild(wrap);
    threadEl.scrollTop = threadEl.scrollHeight;
    return wrap;
  }

  function addSaveButton(afterEl, question, answer) {
    if (!materia) return; // sin materia no sabemos dónde guardarlo
    const btn = document.createElement('button');
    btn.className = 'save-note';
    btn.textContent = 'Guardar como archivo';
    btn.addEventListener('click', async () => {
      const content = `<p><strong>Pregunta:</strong> ${esc(question)}</p><p><strong>Respuesta:</strong> ${esc(answer)}</p>`;
      const r = await apiPOST('create-annotation', {
        user_id: SESSION.id, username: SESSION.username, materia,
        type: 'nota', content, source_session_id: DOC.id || null
      });
      if (r && (r.ok || r.annotation)) {
        btn.textContent = '✓ Guardado en Mis archivos'; btn.classList.add('done');
      } else { toast('No se pudo guardar', 'err'); }
    });
    afterEl.insertAdjacentElement('afterend', btn);
  }

  // ── Enviar ──
  async function send() {
    if (sending) return;
    const question = inputEl.value.trim();
    if (!question && !attachments.length) return;

    const attachNames = attachments.map(a => a.name);
    appendMsg('user', question || '(archivo adjunto)', attachNames);
    inputEl.value = ''; autoGrow();

    // adjuntos binarios (img/pdf) para este turno
    const binAttaches = attachments.filter(a => !a._textOnly).map(a => ({ name: a.name, media_type: a.media_type, data: a.data }));
    attachments = []; renderStrip();

    conversation.push({ role: 'user', content: question });
    const pendingEl = appendMsg('bot', '', null, true);

    sending = true; sendEl.disabled = true;

    const historyForApi = conversation.slice(0, -1);
    const r = await apiPOST('ai-chat', {
      message: question || 'Analizá el material adjunto.',
      conversationHistory: historyForApi,
      contextText: contextText || undefined,
      attachments: binAttaches.length ? binAttaches : undefined,
      materia: materia || undefined
    });

    const answer = (r && (r.response || r.reply)) || '⚠️ No pude obtener una respuesta. Probá de nuevo.';
    conversation.push({ role: 'assistant', content: answer });

    const body = pendingEl.querySelector('.body');
    body.classList.remove('pending');
    body.textContent = answer;

    addSaveButton(pendingEl, question, answer);

    sending = false; sendEl.disabled = false;
    threadEl.scrollTop = threadEl.scrollHeight;
  }

  sendEl.addEventListener('click', send);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function autoGrow() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  }
  inputEl.addEventListener('input', autoGrow);

  // ── Init ──
  loadDocContext();
  setTimeout(() => inputEl.focus(), 200);
</script>
</body>
</html>
