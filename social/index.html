<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/logotriskl.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Pacifico&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <title>triskl</title>
  <style>
    /* ===== RESET Y VARIABLES ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --card: #ffffff;
      --border: #dbdbdb;
      --border-hi: #c7c7c7;
      --white: #262626;
      --soft: #737373;
      --muted: #8e8e8e;
      --dim: #fafafa;
      --accent: #0095f6;
      --accent-dk: #1877f2;
      --accent-glow: rgba(0,149,246,.12);
      --danger: #ed4956;
      --green: #00ba7c;
      --gold: #c9930a;
      --purple: #8a3ab9;
      --shadow: 0 1px 2px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 34px rgba(0,0,0,.16);
      --f: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --f-logo: 'Pacifico', cursive;
      --mono: 'JetBrains Mono', monospace;
      --nav: 56px;
      --bot: 66px;
      --radius: 16px;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--f);
      font-size: 14.5px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: var(--f); cursor: pointer; background: none; border: none; }
    input, textarea, select { font-family: var(--f); outline: none; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 2px; }

    /* ===== SKELETON ===== */
    .sk { background: #eee; border-radius: 6px; animation: pulse 1.2s ease-in-out infinite; }
    .sk-line { height: 14px; margin-bottom: 6px; }
    .sk-card { padding: 16px; margin: 0 14px 12px; background: #fff; border-radius: 12px; border: 1px solid var(--border); }
    @keyframes pulse { 0%,100%{opacity:.4;} 50%{opacity:.8;} }

    /* ===== TOP NAV ===== */
    .topnav {
      position: fixed; top:0; left:0; right:0; z-index:200;
      height: var(--nav);
      background: rgba(255,255,255,.92); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; gap: 10px;
    }
    .nav-logo { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .nav-logo img { width: 24px; height: 24px; object-fit: contain; }
    .nav-logo-text { font-family: var(--f-logo); font-size: 24px; font-weight: 400; letter-spacing: .5px; color: var(--white); line-height: 1; }
    .nav-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: none; border: 0; color: var(--white);
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; position: relative; flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--dim); }
    .icon-btn svg { width: 23px; height: 23px; stroke-width: 1.7; }
    .icon-btn .badge {
      position: absolute; top: 1px; right: 1px;
      background: var(--danger); color: #fff;
      font-size: 9px; font-weight: 700; font-family: var(--mono);
      padding: 1px 4px; border-radius: 99px; min-width: 15px; text-align: center;
      display: none; border: 2px solid #fff;
    }
    .icon-btn .badge.show { display: block; }

    /* ===== PAGES ROOT ===== */
    .page-root {
      position: fixed;
      top: var(--nav);
      left: 0;
      right: 0;
      bottom: calc(var(--bot) + env(safe-area-inset-bottom));
      display: flex;
      overflow: hidden;
      height: calc(100vh - var(--nav) - var(--bot) - env(safe-area-inset-bottom));
    }
    .page {
      display: none;
      flex: 1;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .page.active { display: flex; }

    /* ===== BOTTOM NAV ===== */
    .botnav {
      position: fixed; bottom:0; left:0; right:0; z-index:200;
      height: calc(var(--bot) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(255,255,255,.96); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; align-items: center;
    }
    .bnav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      color: var(--muted); padding: 4px 8px;
      font-size: 9px; font-weight: 700; letter-spacing: .2px;
      background: none; border: 0; transition: color .15s; position: relative;
    }
    .bnav-item.active { color: var(--white); }
    .bnav-item svg { width: 22px; height: 22px; stroke-width: 1.8; }
    .bnav-item .bdot {
      position: absolute; top: 2px; right: 14px;
      width: 7px; height: 7px; border-radius: 50%; background: var(--danger);
      display: none; border: 1.5px solid #fff;
    }
    .bnav-item .bdot.show { display: block; }
    .bnav-item.bnav-ia { color: var(--purple); }
    .bnav-item.bnav-ia svg { stroke: var(--purple); }

    .fab-wrap { position: relative; }
    .fab {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      color: #fff; border: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 18px rgba(0,149,246,.35);
      transition: all .15s;
    }
    .fab:hover { transform: translateY(-1px); }
    .fab.open { transform: rotate(45deg); }
    .fab svg { width: 20px; height: 20px; }
    .fab-menu {
      position: absolute; bottom: calc(100% + 12px); left: 50%;
      transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 6px; min-width: 196px;
      display: none; flex-direction: column; gap: 2px;
      box-shadow: var(--shadow-lg);
      animation: fabUp .18s cubic-bezier(.22,.68,0,1.2) both; z-index:300;
    }
    .fab-menu.open { display: flex; }
    @keyframes fabUp { from { opacity:0; transform: translateX(-50%) translateY(8px) scale(.96); } to { opacity:1; transform: translateX(-50%) translateY(0) scale(1); } }
    .fab-opt {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; border-radius: 11px; border: 0; background: none;
      color: var(--white); font-size: 13px; font-weight: 600; width: 100%;
      text-align: left; transition: background .12s;
    }
    .fab-opt:hover { background: var(--dim); }
    .fab-opt svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
    .fab-bd { position: fixed; inset: 0; z-index: 299; display: none; }
    .fab-bd.open { display: block; }

    /* ===== SCROLL AREA ===== */
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .section-hdr {
      position: sticky; top:0; z-index:10;
      background: rgba(255,255,255,.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px; display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
      flex-shrink: 0;
    }
    .section-title { font-size: 17px; font-weight: 800; letter-spacing: -.2px; }
    .section-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); }

    /* ===== FEED TABS ===== */
    .feed-tabs {
      display: flex; gap: 6px; padding: 10px 14px 4px;
      background: rgba(255,255,255,.92); backdrop-filter: blur(16px);
      position: sticky; top:0; z-index:10; flex-shrink:0;
      border-bottom: 1px solid var(--border);
    }
    .feed-tab {
      flex:1; height: 36px; border-radius: 99px; background: var(--dim);
      border: 1px solid transparent; color: var(--muted);
      font-size: 12px; font-weight: 700; transition: all .15s;
      padding: 0 8px; margin-bottom: 8px;
    }
    .feed-tab.active { color: #fff; background: var(--white); }
    .feed-tab:hover:not(.active) { color: var(--white); border-color: var(--border); }

    /* ===== POST CARD ===== */
    .post-card {
      display: flex; gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      transition: background .12s;
      margin-bottom: 0;
    }
    .post-card:hover { background: #fbfbfb; }
    .post-col-av { flex-shrink: 0; }
    .post-col-main { flex:1; min-width:0; }
    .post-top { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; flex-wrap: wrap; }
    .post-author {
      color: var(--white); font-size: 14px; font-weight: 800;
      background: none; border: 0; padding: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .post-author:hover { text-decoration: underline; }
    .post-dot, .post-time, .post-gen { color: var(--muted); font-size: 12.5px; font-weight: 500; flex-shrink:0; }
    .post-spacer { flex: 1; }
    .post-follow {
      background: none; border: 0; color: var(--accent);
      font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 99px;
    }
    .post-follow:hover { background: var(--accent-glow); }
    .post-del {
      background: none; border:0; color: var(--muted);
      padding: 5px; border-radius: 99px; display: flex;
    }
    .post-del:hover { color: var(--danger); background: var(--danger-glow); }
    .post-title { font-size: 14.5px; font-weight: 700; margin: 2px 0 1px; line-height: 1.35; }
    .post-materia { font-size: 11.5px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
    .post-body, .post-preview { font-size: 14px; line-height: 1.55; color: var(--white); white-space: pre-wrap; word-break: break-word; }
    .post-vis-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(0,186,124,.12); border: 1px solid rgba(0,186,124,.25);
      color: var(--green); font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px; margin-left: 6px;
    }
    .post-vis-tag svg { width: 12px; height: 12px; }
    .read-more { color: var(--accent); font-size: 13px; font-weight: 600; margin-top: 3px; background: none; border:0; }
    .read-more:hover { text-decoration: underline; }
    .post-media { margin: 10px 0 0; border-radius: 14px; overflow: hidden; display: grid; gap: 2px; }
    .media-1 { grid-template-columns: 1fr; }
    .media-2 { grid-template-columns: 1fr 1fr; }
    .media-3 { grid-template-columns: 1fr 1fr; }
    .media-3 .post-media-item:first-child { grid-row: span 2; }
    .media-4 { grid-template-columns: 1fr 1fr; }
    .post-media-item { background: #eee; overflow: hidden; position: relative; cursor: pointer; }
    .post-media-item img, .post-media-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .post-actions {
      display: flex; align-items: center; gap: 2px; margin-top: 10px; max-width: 340px;
    }
    .act {
      display: flex; align-items: center; gap: 6px;
      background: none; border: 0; color: var(--soft);
      font-size: 12.5px; font-weight: 700;
      padding: 7px 10px; border-radius: 99px; transition: all .12s;
    }
    .act svg { width: 19px; height: 19px; stroke-width: 1.9; }
    .act:hover { color: var(--accent); background: var(--accent-glow); }
    .act.act-save:hover { color: var(--green); background: rgba(0,186,124,.1); }
    .cmt-section { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; }

    /* ===== CHAT / MENSAJES ===== */
    .chat-list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
      background: #fff; cursor: pointer; transition: background .12s;
    }
    .chat-list-item:hover { background: var(--dim); }
    .chat-av {
      width: 46px; height: 46px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; flex-shrink:0;
      color: #fff; overflow: hidden; position: relative;
    }
    .chat-av img { width: 100%; height: 100%; object-fit: cover; }
    .chat-item-body { flex:1; min-width:0; }
    .chat-item-top { display: flex; align-items: baseline; justify-content: space-between; gap: 6px; margin-bottom: 3px; }
    .chat-item-name { font-size: 13.5px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-item-time { font-size: 10px; color: var(--muted); font-family: var(--mono); flex-shrink:0; }
    .chat-item-prev { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chat-view {
      position: fixed; inset: 0; z-index:150;
      background: var(--bg); display: flex; flex-direction: column;
      top: var(--nav); bottom: calc(var(--bot) + env(safe-area-inset-bottom));
      animation: slideInRight .22s cubic-bezier(.4,0,.2,1) both;
    }
    .chat-view.hidden { display: none; }
    @keyframes slideInRight { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
    .chat-topbar {
      height: 50px; display: flex; align-items: center; gap: 10px;
      padding: 0 12px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink:0;
    }
    .chat-msgs {
      flex:1; overflow-y: auto; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .day-sep {
      text-align: center; font-size: 10px; color: var(--muted);
      font-family: var(--mono); padding: 8px 0;
      display: flex; align-items: center; gap: 8px;
    }
    .day-sep::before, .day-sep::after { content: ''; flex:1; height:1px; background: var(--border); }
    .day-sep span { background: var(--bg); padding: 0 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .msg-row { display: flex; margin-bottom: 4px; }
    .msg-row.mine { justify-content: flex-end; }
    .msg-row.theirs { justify-content: flex-start; }
    .msg-inner { max-width: min(72%, 340px); display: flex; flex-direction: column; }
    .mine .msg-inner { align-items: flex-end; }
    .theirs .msg-inner { align-items: flex-start; }
    .msg-bubble {
      padding: 9px 13px; font-size: 14px; line-height: 1.5;
      word-break: break-word; border-radius: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }
    .mine .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 5px; }
    .theirs .msg-bubble { background: #fff; border: 1px solid var(--border); border-bottom-left-radius: 5px; }
    .msg-sender { font-size: 10px; color: var(--blue); font-family: var(--mono); padding: 0 2px 2px; }
    .msg-ts { font-size: 9px; color: var(--muted); font-family: var(--mono); padding: 2px 2px 0; }
    .chat-input-row {
      flex-shrink:0; display: flex; gap: 8px; align-items: flex-end;
      padding: 10px 12px; border-top: 1px solid var(--border);
      background: var(--surface); position: relative;
    }
    .chat-input-wrapper {
      flex:1; display: flex; gap: 8px; align-items: center;
      background: var(--dim); border-radius: 24px; padding: 4px 4px 4px 16px;
      border: 1px solid var(--border);
      transition: border-color .15s;
    }
    .chat-input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .chat-input {
      flex:1; background: transparent; color: var(--white);
      border: 0; outline: none; padding: 8px 0;
      font-size: 14px; resize: none; min-height: 36px; max-height: 100px; line-height: 1.4;
    }
    .send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); color: #fff; border: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s; flex-shrink:0;
    }
    .send-btn:hover { background: var(--accent-dk); }
    .send-btn svg { width: 16px; height: 16px; }

    /* ===== FULL-SCREEN PROFILE (like Instagram) ===== */
    .full-profile-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: var(--bg); display: flex; flex-direction: column;
      animation: slideInRight .22s cubic-bezier(.4,0,.2,1) both;
      top: var(--nav); bottom: calc(var(--bot) + env(safe-area-inset-bottom));
    }
    .full-profile-overlay.hidden { display: none; }
    .full-profile-topbar {
      height: 50px; display: flex; align-items: center; gap: 10px;
      padding: 0 12px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink:0;
    }
    .full-profile-scroll { flex:1; overflow-y: auto; padding: 0 0 20px; }

    /* ===== IA PAGE ===== */
    .ia-chat-container {
      display: flex; flex-direction: column; height: 100%;
    }
    .ia-msgs {
      flex:1; overflow-y: auto; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .ia-msg { display: flex; margin-bottom: 4px; }
    .ia-msg.bot { justify-content: flex-start; }
    .ia-msg.user { justify-content: flex-end; }
    .ia-bubble {
      max-width: 80%; padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.5; word-break: break-word;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }
    .ia-msg.bot .ia-bubble { background: #fff; border: 1px solid var(--border); border-bottom-left-radius: 5px; }
    .ia-msg.user .ia-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 5px; }
    .ia-typing { color: var(--muted); font-style: italic; font-size: 13px; padding: 8px 14px; }

    /* ===== MODALS ===== */
    .modal-overlay {
      position: fixed; inset:0; z-index:400;
      background: rgba(0,0,0,.45); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .18s ease both;
    }
    .modal-overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-sheet {
      width:100%; max-width:560px;
      background: var(--card); border:1px solid var(--border);
      border-bottom:0; border-radius:20px 20px 0 0;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
      animation: slideUp .22s cubic-bezier(.22,.68,0,1.2) both;
      box-shadow: var(--shadow-lg);
      max-height: 92vh; overflow-y: auto;
    }
    @keyframes slideUp { from { opacity:0; transform: translateY(18px); } to { opacity:1; transform: translateY(0); } }
    @media(min-width:600px) { .modal-overlay { align-items: center; padding:20px; } .modal-sheet { border-radius:18px; border-bottom:1px solid var(--border); } }
    .modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom:18px; }
    .modal-title { font-size:16px; font-weight:800; }
    .modal-close {
      width:28px; height:28px; border-radius:50%;
      background:var(--dim); border:1px solid var(--border);
      color:var(--muted); display:flex; align-items:center; justify-content:center;
    }
    .modal-close:hover { color:var(--white); }
    .modal-close svg { width:12px; height:12px; }

    /* ===== FORM ELEMENTS ===== */
    .form-group { display: flex; flex-direction: column; gap:5px; margin-bottom:12px; }
    .form-label { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    .form-ctrl {
      background:#fafafa; color:var(--white);
      border:1px solid var(--border); outline:none;
      padding:10px 12px; font-size:13px; font-family:var(--f);
      border-radius:10px; transition:all .15s; width:100%;
    }
    .form-ctrl:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); background:#fff; }
    .btn {
      height:38px; padding:0 16px; border-radius:10px; border:0;
      font-family:var(--f); font-size:13px; font-weight:700;
      display:inline-flex; align-items:center; gap:7px; transition:all .12s;
    }
    .btn svg { width:14px; height:14px; flex-shrink:0; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-dk); }
    .btn-ghost { background:#fff; color:var(--soft); border:1px solid var(--border); }
    .btn-ghost:hover { color:var(--white); border-color:var(--border-hi); }
    .btn-green { background:rgba(0,186,124,.1); color:var(--green); border:1px solid rgba(0,186,124,.25); }
    .btn-sm { height:30px; padding:0 12px; font-size:11px; border-radius:8px; }
    .btn-xs { height:24px; padding:0 9px; font-size:10px; border-radius:6px; }
    .btn-block { width:100%; justify-content:center; }

    .chip { display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:99px; font-size:10px; font-weight:700; font-family:var(--mono); }
    .chip-green { background:rgba(0,186,124,.1); color:var(--green); border:1px solid rgba(0,186,124,.18); }
    .chip-accent { background:rgba(0,149,246,.1); color:var(--accent); border:1px solid rgba(0,149,246,.2); }

    .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 24px; gap:12px; text-align:center; color:var(--muted); }
    .empty-title { font-size:15px; font-weight:700; color:var(--white); }
    .empty-sub { font-size:12px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: calc(var(--bot) + env(safe-area-inset-bottom) + 10px);
      left: 50%; transform: translateX(-50%);
      z-index: 999; background: #262626; border: 1px solid rgba(255,255,255,.08);
      color: #fff; padding: 11px 18px; border-radius: 99px; font-size: 13px; font-weight: 600;
      white-space: nowrap; animation: toastIn .18s ease both;
      display: flex; align-items: center; gap: 7px; box-shadow: var(--shadow-lg);
    }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    /* ===== OTHER ===== */
    .folder-card { background: var(--card); border:1px solid var(--border); border-radius:16px; padding:14px; cursor:pointer; transition:all .15s; display:flex; flex-direction:column; gap:8px; }
    .folder-card:hover { border-color:var(--border-hi); transform:translateY(-1px); box-shadow:var(--shadow); }
    .folder-icon { width:40px; height:40px; border-radius:12px; background:var(--accent-glow); border:1px solid rgba(0,149,246,.2); display:flex; align-items:center; justify-content:center; color:var(--accent); }
    .folder-icon svg { width:20px; height:20px; }
    .folder-name { font-size:14px; font-weight:700; line-height:1.3; color:var(--white); }
    .folder-meta { font-size:10px; color:var(--muted); font-family:var(--mono); }

    .materias-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:14px; }
    @media(min-width:500px){ .materias-grid { grid-template-columns:repeat(3,1fr); } }
  </style>
</head>

<!-- ===== SCRIPTS ===== -->
<script>
// ============================================================
//  VARIABLES GLOBALES
// ============================================================
const API = '/api/handler';
const LS = 'triskl_session';
let SESSION = (() => { try { return JSON.parse(localStorage.getItem(LS)); } catch (_) { return null; } })();
if (!SESSION?.id) location.href = '/';

let follows = new Set();
let myFollowers = new Set();
let allSessions = [];
let materialFolders = {};
let savedPubsByMateria = {};
let feedTab = 'all';
let currentChat = null;
let chatPollTimer = null;
let _feed = { cursor: null, loading: false, done: false, token: 0 };

// ============================================================
//  AUXILIARES
// ============================================================
const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const fmtDate = iso => iso ? new Date(iso).toLocaleString('es-UY', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
const fmtTime = iso => iso ? new Date(iso).toLocaleTimeString('es-UY', { hour: '2-digit', minute: '2-digit' }) : '';
const fmtDay = iso => {
  if (!iso) return '';
  const d = new Date(iso), t = new Date(), y = new Date(t);
  y.setDate(y.getDate() - 1);
  if (d.toDateString() === t.toDateString()) return 'Hoy';
  if (d.toDateString() === y.toDateString()) return 'Ayer';
  return d.toLocaleDateString('es-UY', { day: '2-digit', month: '2-digit', year: 'numeric' });
};
const fmtRelTime = iso => {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'ahora';
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h`;
  return fmtDay(iso);
};
const toast = (msg, type = 'ok', ms = 2300) => {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${type === 'ok' ? '<polyline points="20 6 9 17 4 12"/>' : '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'}</svg><span>${esc(msg)}</span>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), ms);
};
const openModal = id => document.getElementById(id).classList.remove('hidden');
const closeModal = id => document.getElementById(id).classList.add('hidden');

const AV_COLORS = ['#0095f6', '#8a3ab9', '#00ba7c', '#ed4956', '#f77737', '#00a3c4', '#5b5bd6', '#e11d48'];
const avColor = str => { let h = 0; for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) % AV_COLORS.length; return AV_COLORS[h]; };
const buildAv = (username, avatarUrl, size = 'av-sm') => {
  const div = document.createElement('div');
  div.className = `av ${size}`;
  div.style.background = avColor(username || '?');
  div.style.borderRadius = '50%';
  div.style.display = 'flex';
  div.style.alignItems = 'center';
  div.style.justifyContent = 'center';
  div.style.fontWeight = '800';
  div.style.flexShrink = '0';
  div.style.overflow = 'hidden';
  if (avatarUrl) { const img = document.createElement('img'); img.src = avatarUrl; img.onerror = () => img.remove(); div.appendChild(img); }
  else div.textContent = (username || '?')[0].toUpperCase();
  return div;
};

const isJWTExpired = () => { try { const e = SESSION?.expires_at; if (!e) return false; return Date.now() > (e > 1e12 ? e : e * 1000) - 30000; } catch (_) { return false; } };
const refreshSession = async () => {
  const rt = SESSION?.refresh_token;
  if (!rt) return false;
  try {
    const d = await fetch(`${API}?action=refresh-token`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh_token: rt }) }).then(r => r.json());
    if (d?.jwt) { SESSION = { ...SESSION, jwt: d.jwt, refresh_token: d.refresh_token || SESSION.refresh_token, expires_at: d.expires_at || SESSION.expires_at }; localStorage.setItem(LS, JSON.stringify(SESSION)); return true; }
  } catch (_) { }
  return false;
};
const ensureJWT = async () => {
  if (!isJWTExpired()) return;
  if (await refreshSession()) return;
  try { const r = await fetch(`${API}?action=verify-session`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ jwt: SESSION?.jwt }) }).then(r => r.json()); if (r?.jwt) { SESSION = { ...SESSION, ...r }; localStorage.setItem(LS, JSON.stringify(SESSION)); } } catch (_) { }
};
const apiGet = async url => { await ensureJWT(); return fetch(url, { headers: { Authorization: `Bearer ${SESSION?.jwt || ''}` } }).then(r => r.json()).catch(() => []); };
const apiPost = async (action, body) => { await ensureJWT(); return fetch(`${API}?action=${action}`, { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${SESSION?.jwt || ''}` }, body: JSON.stringify(body) }).then(r => r.json()).catch(() => ({})); };

// ============================================================
//  NAVEGACIÓN
// ============================================================
let currentPage = 'feed';

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
  document.getElementById('chatView').classList.add('hidden');
  document.getElementById('fullProfileOverlay').classList.add('hidden');
  document.getElementById('searchOverlay')?.classList.add('hidden');
  closeFab();
}

function showPage(page) {
  if (page === 'transcript') { location.href = '/transcript'; return; }
  currentPage = page;
  closeAllModals();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bnav-item[data-page]').forEach(t => t.classList.toggle('active', t.dataset.page === page));
  const el = document.getElementById(`page-${page}`);
  if (el) el.classList.add('active');
  if (page === 'feed') loadFeed();
  if (page === 'materias') loadMaterias();
  if (page === 'messages') loadChatList();
  if (page === 'profile') loadProfile();
  if (page === 'ia') loadIA();
}

document.querySelectorAll('[data-page]').forEach(btn => {
  btn.addEventListener('click', () => showPage(btn.dataset.page));
});
document.getElementById('msgTopBtn').addEventListener('click', () => showPage('messages'));

// FAB
function toggleFab() {
  const menu = document.getElementById('fabMenu');
  const btn = document.getElementById('fabBtn');
  const bd = document.getElementById('fabBd');
  const open = menu.classList.toggle('open');
  btn.classList.toggle('open', open);
  bd.classList.toggle('open', open);
}
function closeFab() { document.getElementById('fabMenu').classList.remove('open'); document.getElementById('fabBtn').classList.remove('open'); document.getElementById('fabBd').classList.remove('open'); }
document.getElementById('fabBtn').addEventListener('click', toggleFab);
document.getElementById('fabBd').addEventListener('click', closeFab);
document.getElementById('fabNewPost').addEventListener('click', () => { closeFab(); openNewPostModal(); });
document.getElementById('fabGrabar').addEventListener('click', () => { closeFab(); location.href = '/transcript'; });
document.getElementById('fabEvento').addEventListener('click', () => { closeFab(); openEventModal(); });
document.getElementById('fabNewDM').addEventListener('click', () => { closeFab(); openModal('newChatModal'); });

// ============================================================
//  FEED
// ============================================================
function feedSkeleton(n = 3) {
  const wrap = document.createElement('div');
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'sk-card';
    c.innerHTML = `
      <div style="display:flex; gap:10px; margin-bottom:12px;">
        <div class="sk" style="width:32px; height:32px; border-radius:10px;"></div>
        <div style="flex:1;"><div class="sk sk-line" style="width:38%"></div><div class="sk sk-line" style="width:22%; height:9px;"></div></div>
      </div>
      <div class="sk sk-line" style="width:70%"></div>
      <div class="sk sk-line" style="width:100%"></div>
      <div class="sk sk-line" style="width:85%"></div>
    `;
    wrap.appendChild(c);
  }
  return wrap;
}

async function loadFeed(highlightPostId = null) {
  const scroll = document.getElementById('feedScroll');
  const token = ++_feed.token;
  _feed.cursor = null;
  _feed.done = false;
  _feed.loading = false;
  scroll.innerHTML = '';
  scroll.appendChild(feedSkeleton());
  await loadMoreFeed(token, highlightPostId);
}

async function loadMoreFeed(token = _feed.token, highlightId = null) {
  if (_feed.loading || _feed.done || token !== _feed.token) return;
  _feed.loading = true;
  const scroll = document.getElementById('feedScroll');
  const first = !_feed.cursor;
  const scope = feedTab === 'mine' ? 'mine' : feedTab === 'friends' ? 'friends' : 'gen';
  let url = `${API}?action=feed&media=0&scope=${scope}&limit=${first ? 20 : 15}`;
  if (_feed.cursor) url += `&before=${encodeURIComponent(_feed.cursor)}`;

  let data = {};
  try { data = await apiGet(url); } catch (_) { }
  if (token !== _feed.token) { _feed.loading = false; return; }

  document.querySelector('#feedScroll .sk-card')?.remove();
  if (first) scroll.innerHTML = '';

  const items = Array.isArray(data?.items) ? data.items : [];
  _feed.cursor = data?.next_cursor || _feed.cursor;
  _feed.done = !data?.has_more;

  if (first && !items.length) {
    const msg = feedTab === 'friends' ? 'Todavía no tenés amigos con publicaciones.' :
      feedTab === 'mine' ? 'No tenés publicaciones privadas.' :
      'Todavía no hay nada por acá.';
    scroll.innerHTML = `<div class="empty-state"><div class="empty-title">Sin publicaciones</div><div class="empty-sub">${msg}</div></div>`;
    _feed.loading = false;
    return;
  }

  items.forEach(p => {
    const card = buildPostCard(p);
    if (card) scroll.appendChild(card);
  });

  if (!_feed.done) {
    const s = document.createElement('div');
    s.id = 'feedSentinel';
    s.textContent = 'Cargando más…';
    scroll.appendChild(s);
    new IntersectionObserver(es => { if (es[0].isIntersecting) loadMoreFeed(token); }, { root: scroll, rootMargin: '400px' }).observe(s);
  }
  _feed.loading = false;
}

function buildPostCard(p) {
  if (!p || !p.id) return null;
  const isOwn = p.user_id === SESSION.id;
  const isF = follows.has(p.user_id);
  const isRaw = p.content?.startsWith('!!POST!!');
  const isPoll = p.post_type === 'encuesta';
  const isTrans = !isPoll && !isRaw;
  const body = isRaw ? p.content.replace(/^!!POST!!\n?/, '') : (p.content || '');

  const div = document.createElement('div');
  div.className = 'post-card';
  div.dataset.pubId = p.id;

  // Avatar
  const avCol = document.createElement('div');
  avCol.className = 'post-col-av';
  const avEl = buildAv(p.username || '?', p.user?.avatar_url, 'av-md');
  avEl.style.cursor = 'pointer';
  avEl.addEventListener('click', () => openFullProfile(p.user_id, p.username));
  avCol.appendChild(avEl);
  div.appendChild(avCol);

  const main = document.createElement('div');
  main.className = 'post-col-main';
  div.appendChild(main);

  // top
  const top = document.createElement('div');
  top.className = 'post-top';
  const author = document.createElement('button');
  author.className = 'post-author';
  author.textContent = '@' + (p.username || '?');
  author.addEventListener('click', () => openFullProfile(p.user_id, p.username));
  top.appendChild(author);
  if (p.user?.gen) {
    const d = document.createElement('span');
    d.className = 'post-dot';
    d.textContent = '·';
    const g = document.createElement('span');
    g.className = 'post-gen';
    g.textContent = 'Gen ' + p.user.gen;
    top.appendChild(d);
    top.appendChild(g);
  }
  const d2 = document.createElement('span');
  d2.className = 'post-dot';
  d2.textContent = '·';
  const tm = document.createElement('span');
  tm.className = 'post-time';
  tm.textContent = fmtRelTime(p.created_at);
  tm.title = fmtDate(p.created_at);
  top.appendChild(d2);
  top.appendChild(tm);

  // tag "Solo amigos"
  if (p.visibility === 'friends') {
    const tag = document.createElement('span');
    tag.className = 'post-vis-tag';
    tag.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="3"/></svg> Solo amigos`;
    top.appendChild(tag);
  }

  const sp = document.createElement('span');
  sp.className = 'post-spacer';
  top.appendChild(sp);

  if (!isOwn && !isF) {
    const fb = document.createElement('button');
    fb.className = 'post-follow';
    fb.textContent = 'Seguir';
    fb.addEventListener('click', async () => { await toggleFollow(p.user_id); fb.remove(); });
    top.appendChild(fb);
  }
  if (isOwn) {
    const del = document.createElement('button');
    del.className = 'post-del';
    del.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    del.addEventListener('click', async () => {
      if (!confirm('¿Eliminar?')) return;
      const r = await apiPost('delete-publication', { pub_id: p.id, user_id: SESSION.id });
      if (r.ok) { toast('Eliminada'); div.remove(); } else toast('Error', 'err');
    });
    top.appendChild(del);
  }
  main.appendChild(top);

  if (p.title) { const t = document.createElement('div'); t.className = 'post-title'; t.textContent = p.title; main.appendChild(t); }
  if (p.materia && p.materia !== p.title) { const m = document.createElement('div'); m.className = 'post-materia'; m.textContent = p.materia; main.appendChild(m); }

  if (isPoll) {
    main.appendChild(buildPollEl(p));
  } else if (isTrans) {
    const preview = body.slice(0, 280);
    const hasMore = body.length > 280;
    const pb = document.createElement('div');
    pb.className = 'post-preview';
    pb.textContent = preview + (hasMore ? '…' : '');
    main.appendChild(pb);
    if (hasMore) {
      const rb = document.createElement('button');
      rb.className = 'read-more';
      rb.textContent = 'Leer transcripción completa';
      rb.addEventListener('click', () => openFulltext(p));
      main.appendChild(rb);
    }
  } else {
    const b = document.createElement('div');
    b.className = 'post-body';
    b.textContent = body;
    main.appendChild(b);
  }

  // acciones
  const actions = document.createElement('div');
  actions.className = 'post-actions';

  const cmtBtn = document.createElement('button');
  cmtBtn.className = 'act';
  cmtBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="cmt-count-${p.id}">${p.comments_count || 0}</span>`;
  actions.appendChild(cmtBtn);

  if (isTrans) {
    const saveBtn = document.createElement('button');
    saveBtn.className = 'act act-save';
    saveBtn.title = 'Guardar en materia';
    saveBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
    saveBtn.addEventListener('click', () => openAddToFolderForPost({ id: p.id, title: p.title, materia: p.materia, content: p.content, username: p.username }));
    actions.appendChild(saveBtn);
  }

  const shareBtn = document.createElement('button');
  shareBtn.className = 'act';
  shareBtn.title = 'Copiar link';
  shareBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>`;
  shareBtn.addEventListener('click', () => { navigator.clipboard.writeText(`${location.origin}/social?pub=${p.id}`); toast('Link copiado'); });
  actions.appendChild(shareBtn);

  main.appendChild(actions);

  // Media
  if (p.media) {
    try {
      const arr = JSON.parse(p.media);
      if (Array.isArray(arr) && arr.length) {
        const mg = document.createElement('div');
        mg.className = `post-media media-${Math.min(arr.length, 4)}`;
        arr.slice(0, 4).forEach(m => {
          const item = document.createElement('div');
          item.className = 'post-media-item';
          if (m.type === 'video') item.innerHTML = `<video src="${esc(m.url)}" muted playsinline preload="metadata"></video>`;
          else item.innerHTML = `<img src="${esc(m.url)}" alt="" loading="lazy"/>`;
          item.addEventListener('click', () => openMediaViewer(m));
          mg.appendChild(item);
        });
        main.appendChild(mg);
      }
    } catch (_) { }
  }

  // comentarios inline (simplificado)
  const cmtSection = document.createElement('div');
  cmtSection.className = 'cmt-section';
  cmtSection.style.display = 'none';
  cmtSection.innerHTML = `
    <div style="display:flex; gap:6px; margin-bottom:10px;">
      <input class="form-ctrl" type="text" placeholder="Escribí un comentario…" style="flex:1; padding:8px 12px; font-size:13px; border-radius:99px;">
      <button class="btn btn-primary btn-xs">Enviar</button>
    </div>
    <div id="cmtList_${p.id}"></div>
  `;
  main.appendChild(cmtSection);

  cmtBtn.addEventListener('click', async () => {
    if (cmtSection.style.display !== 'none') { cmtSection.style.display = 'none'; return; }
    cmtSection.style.display = 'block';
    const list = cmtSection.querySelector('#cmtList_' + p.id);
    list.innerHTML = '<div style="color:var(--muted); font-size:12px; padding:6px 0;">Cargando…</div>';
    const rows = await apiGet(`${API}?action=comments&publication_id=${p.id}`);
    renderCmtList(list, rows, p.id, div);
  });

  const inputCmt = cmtSection.querySelector('input');
  const btnCmt = cmtSection.querySelector('button');
  btnCmt.addEventListener('click', async () => {
    const txt = inputCmt.value.trim();
    if (!txt) return;
    inputCmt.value = '';
    await apiPost('add-comment', { publication_id: p.id, user_id: SESSION.id, username: SESSION.username, content: txt });
    const rows = await apiGet(`${API}?action=comments&publication_id=${p.id}`);
    const list = cmtSection.querySelector('#cmtList_' + p.id);
    renderCmtList(list, rows, p.id, div);
    const countEl = div.querySelector(`.cmt-count-${p.id}`);
    if (countEl) countEl.textContent = rows?.length || 0;
    toast('Comentario enviado');
  });
  inputCmt.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); btnCmt.click(); } });

  return div;
}

function renderCmtList(list, rows, pubId, cardDiv) {
  list.innerHTML = '';
  if (!Array.isArray(rows) || !rows.length) { list.innerHTML = '<div style="color:var(--muted); font-size:12px; padding:6px 0;">Sin comentarios aún.</div>'; return; }
  rows.forEach(c => {
    const d = document.createElement('div');
    d.style.cssText = 'padding:8px 0; border-bottom:1px solid var(--border);';
    d.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <button style="background:none; border:0; color:var(--blue); font-size:12px; font-weight:700; cursor:pointer;">@${esc(c.username||'?')}</button>
        <span style="color:var(--muted); font-size:9px; font-family:var(--mono);">${fmtTime(c.created_at)}</span>
      </div>
      <div style="font-size:13px; line-height:1.5; margin-top:3px; color:var(--soft);">${esc(c.content||'')}</div>
    `;
    d.querySelector('button').addEventListener('click', () => openFullProfile(c.user_id, c.username));
    list.appendChild(d);
  });
}

function buildPollEl(p) {
  let opts = [], votes = {}, voters = [];
  try { opts = JSON.parse(p.poll_options || '[]'); votes = JSON.parse(p.poll_votes || '{}'); voters = JSON.parse(p.poll_voters || '[]'); } catch (_) { }
  const total = Object.values(votes).reduce((a, b) => a + b, 0);
  const already = voters.includes(SESSION.id);
  const wrap = document.createElement('div');
  wrap.style.cssText = 'margin-top:6px;';
  const q = document.createElement('div');
  q.style.cssText = 'font-weight:700; font-size:14px; margin-bottom:8px;';
  q.textContent = p.content;
  wrap.appendChild(q);
  opts.forEach(opt => {
    const count = votes[opt] || 0;
    const pct = total ? Math.round(count / total * 100) : 0;
    const btn = document.createElement('button');
    btn.style.cssText = 'width:100%; background:var(--dim); border:1px solid var(--border); color:var(--white); text-align:left; padding:7px 10px; font-size:12px; border-radius:8px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center; position:relative; overflow:hidden; cursor:pointer;';
    btn.innerHTML = `<div style="position:absolute; left:0; top:0; bottom:0; width:${pct}%; background:var(--accent-glow);"></div><span style="position:relative;">${esc(opt)}</span><span style="position:relative; font-size:10px; color:var(--muted); font-family:var(--mono);">${pct}% (${count})</span>`;
    if (!already) btn.addEventListener('click', async () => { await apiPost('vote-poll', { pub_id: p.id, option: opt, user_id: SESSION.id }); loadFeed(); });
    wrap.appendChild(btn);
  });
  return wrap;
}

// ============================================================
//  FOLLOWS
// ============================================================
async function loadFollows() {
  const [fol, followrs] = await Promise.all([
    apiGet(`${API}?action=follows&follower_id=${SESSION.id}`),
    apiGet(`${API}?action=followers&user_id=${SESSION.id}`)
  ]);
  follows = new Set((Array.isArray(fol) ? fol : []).map(r => r.followed_id).filter(Boolean));
  myFollowers = new Set((Array.isArray(followrs) ? followrs : []).map(r => r.id || r.follower_id).filter(Boolean));
}
const isFriend = uid => follows.has(uid) && myFollowers.has(uid);
async function toggleFollow(uid) {
  if (follows.has(uid)) { await apiPost('unfollow', { follower_id: SESSION.id, followed_id: uid }); follows.delete(uid); }
  else { await apiPost('follow', { follower_id: SESSION.id, followed_id: uid }); follows.add(uid); }
  return follows.has(uid);
}

async function loadMaterias() {
  const grid = document.getElementById('materiasGrid');
  grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-sub">Cargando…</div></div>';
  const rows = await apiGet(`${API}?action=sessions&username=${encodeURIComponent(SESSION.username)}`);
  allSessions = Array.isArray(rows) ? rows : [];
  try { savedPubsByMateria = JSON.parse(localStorage.getItem(`triskl_saved_pubs_${SESSION.id}`) || '{}'); } catch (_) { savedPubsByMateria = {}; }
  const mats = [...new Set([...allSessions.map(s => s.materia).filter(Boolean), ...Object.keys(savedPubsByMateria)])].sort();
  materialFolders = {};
  mats.forEach(m => { materialFolders[m] = { sessions: allSessions.filter(s => s.materia === m), savedPubs: savedPubsByMateria[m] || [] }; });
  const dl = document.getElementById('materiasDatalist');
  if (dl) { dl.innerHTML = ''; mats.forEach(m => { const o = document.createElement('option'); o.value = m; dl.appendChild(o); }); }
  const exportSel = document.getElementById('exportMatSel');
  if (exportSel) { exportSel.innerHTML = '<option value="">Seleccioná…</option>'; mats.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; exportSel.appendChild(o); }); }
  const totalSessions = allSessions.length, totalSaved = Object.values(savedPubsByMateria).reduce((a, b) => a + b.length, 0);
  document.getElementById('materiasCount').textContent = `${mats.length} materia${mats.length !== 1 ? 's' : ''} · ${totalSessions} sesión${totalSessions !== 1 ? 'es' : ''} · ${totalSaved} guardadas`;
  grid.innerHTML = '';
  if (!mats.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-title">Sin materias aún</div><div class="empty-sub">Grabá una sesión o guardá transcripciones del feed.</div></div>'; loadEventsBanner(); return; }
  mats.forEach(m => {
    const folder = materialFolders[m];
    const active = folder.sessions.filter(s => !s.ended_at).length;
    const card = document.createElement('button');
    card.className = 'folder-card';
    card.innerHTML = `
      <div class="folder-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
      <div class="folder-name">${esc(m)}</div>
      <div class="folder-meta">${folder.sessions.length} sesión${folder.sessions.length !== 1 ? 'es' : ''}${folder.savedPubs.length ? ` · ${folder.savedPubs.length} guardada${folder.savedPubs.length !== 1 ? 's' : ''}` : ''}${active ? ` · <span style="color:var(--gold)">${active} activa${active !== 1 ? 's' : ''}</span>` : ''}</div>
    `;
    card.addEventListener('click', () => openFolder(m));
    grid.appendChild(card);
  });
  loadEventsBanner();
}

function renderIAChat() {
  const container = document.getElementById('iaMsgs');
  container.innerHTML = '';
  iaHistory.forEach(msg => {
    const row = document.createElement('div');
    row.className = `ia-msg ${msg.role === 'user' ? 'user' : 'bot'}`;
    const bubble = document.createElement('div');
    bubble.className = 'ia-bubble';

  const input = document.getElementById('iaInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  iaHistory.push({ role: 'user', content: text });
  renderIAChat();

  // Mostrar "pensando"
  const typing = document.createElement('div');
  typing.className = 'ia-msg bot';
  typing.innerHTML = `<div class="ia-bubble ia-typing">⏳ Pensando…</div>`;
  document.getElementById('iaMsgs').appendChild(typing);

  // Llamada a la API (si existe) o simulación

    const resp = await apiPost('ia-ask', { question: text, user_id: SESSION.id });
    const answer = resp.answer || 'Lo siento, no pude procesar tu pregunta. Intentalo de nuevo.';
    iaHistory.push({ role: 'bot', content: answer });

async function loadChatList() {
  const list = document.getElementById('chatList');
  list.innerHTML = '<div class="empty-state"><div class="empty-sub">Cargando…</div></div>';
  const [sent, recv, groups] = await Promise.all([
    apiGet(`${API}?action=dms&sender_id=${SESSION.id}`),
    apiGet(`${API}?action=dms&receiver_id=${SESSION.id}`),
    apiGet(`${API}?action=my-groups&user_id=${SESSION.id}`)
  ]);
  const all = [...(Array.isArray(sent) ? sent : []), ...(Array.isArray(recv) ? recv : [])];
  const partners = {};
  all.forEach(m => {
    const pid = m.sender_id === SESSION.id ? m.receiver_id : m.sender_id;
    const pname = (m.sender_id === SESSION.id ? m.receiver_uname : m.sender_uname) || '';
    if (!pid) return;
    if (!partners[pid] || new Date(m.created_at) > new Date(partners[pid].last.created_at)) {
      partners[pid] = { id: pid, uname: pname.toLowerCase(), last: m, type: 'dm' };
    }
  });
  const dms = Object.values(partners).sort((a, b) => new Date(b.last.created_at) - new Date(a.last.created_at));
  const grps = (Array.isArray(groups) ? groups : []).sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
  list.innerHTML = '';
  if (!dms.length && !grps.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-title">Sin conversaciones</div><div class="empty-sub">Empezá uno nuevo.</div></div>';
    return;
  }
  dms.forEach(item => {
    const el = document.createElement('div');
    el.className = 'chat-list-item';
    const av = document.createElement('div');
    av.className = 'chat-av';
    av.style.background = avColor(item.uname);
    av.textContent = (item.uname[0] || '?').toUpperCase();
    el.appendChild(av);
    const body = document.createElement('div');
    body.className = 'chat-item-body';
    body.innerHTML = `
      <div class="chat-item-top"><div class="chat-item-name">@${esc(item.uname)}</div><div class="chat-item-time">${fmtRelTime(item.last.created_at)}</div></div>
      <div class="chat-item-prev">${item.last.sender_id === SESSION.id ? 'Tú: ' : ''}${esc((item.last.content || '').slice(0, 42))}${(item.last.content || '').length > 42 ? '…' : ''}</div>
    `;
    el.appendChild(body);
    el.addEventListener('click', () => openChat({ type: 'dm', id: item.id, name: `@${item.uname}` }));
    list.appendChild(el);
    // avatar
    getAvatar(item.id).then(url => { if (url) { const img = document.createElement('img'); img.src = url; img.onerror = () => img.remove(); av.innerHTML = ''; av.appendChild(img); } });
  });
  grps.forEach(g => {
    const el = document.createElement('div');
    el.className = 'chat-list-item';
    el.innerHTML = `
      <div class="chat-av" style="background:var(--blue); display:flex; align-items:center; justify-content:center; font-size:20px;">👥</div>
      <div class="chat-item-body">
        <div class="chat-item-top"><div class="chat-item-name">${esc(g.name || 'Grupo')}</div><div class="chat-item-time">${fmtRelTime(g.created_at)}</div></div>
        <div class="chat-item-prev">${g.member_count || 0} miembro${g.member_count !== 1 ? 's' : ''}</div>
      </div>
    `;
    el.addEventListener('click', () => openChat({ type: 'group', id: g.id, name: g.name }));
    list.appendChild(el);
  });
}

const avatarCache = {};
async function getAvatar(uid) {
  if (uid in avatarCache) return avatarCache[uid];
  try { const rows = await apiGet(`${API}?action=user-profile&user_id=${uid}`); const u = Array.isArray(rows) ? rows[0] : rows; avatarCache[uid] = u?.avatar_url || null; } catch (_) { avatarCache[uid] = null; }
  return avatarCache[uid];
}

async function openChat(chat) {
  currentChat = chat;
  const view = document.getElementById('chatView');
  view.classList.remove('hidden');
  document.getElementById('chatTitle').textContent = chat.name;
  const topAv = document.getElementById('chatTopbarAv');
  topAv.innerHTML = '';
  if (chat.type === 'group') {
    const groupData = await apiGet(`${API}?action=group-detail&id=${chat.id}`);
    if (groupData?.avatar_url) { const img = document.createElement('img'); img.src = groupData.avatar_url; img.onerror = () => img.remove(); topAv.appendChild(img); topAv.style.background = 'transparent'; } else { topAv.textContent = '👥'; topAv.style.background = 'var(--blue)'; }
  } else {
    const uname = (chat.name || '').replace('@', '');
    topAv.style.background = avColor(uname);
    topAv.textContent = (uname[0] || '?').toUpperCase();
    getAvatar(chat.id).then(url => { if (url) { const img = document.createElement('img'); img.src = url; img.onerror = () => img.remove(); topAv.innerHTML = ''; topAv.appendChild(img); } });
  }
  document.getElementById('groupMembersBtn').style.display = chat.type === 'group' ? '' : 'none';
  document.getElementById('addGroupMemberBtn').style.display = chat.type === 'group' ? '' : 'none';
  document.getElementById('chatMsgs').innerHTML = '';
  fetchChatMsgs();
  if (chatPollTimer) clearInterval(chatPollTimer);
  chatPollTimer = setInterval(fetchChatMsgs, 5000);
}

document.getElementById('chatBack').addEventListener('click', () => {
  document.getElementById('chatView').classList.add('hidden');
  if (chatPollTimer) clearInterval(chatPollTimer);
  currentChat = null;
});

async function fetchChatMsgs() {
  if (!currentChat) return;
  let msgs = [];
  if (currentChat.type === 'dm') {
    const [a, b] = await Promise.all([
      apiGet(`${API}?action=dms&sender_id=${SESSION.id}&receiver_id=${currentChat.id}`),
      apiGet(`${API}?action=dms&sender_id=${currentChat.id}&receiver_id=${SESSION.id}`)
    ]);
    msgs = [...(Array.isArray(a) ? a : []), ...(Array.isArray(b) ? b : [])].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  } else {
    msgs = await apiGet(`${API}?action=group-messages&group_id=${currentChat.id}`);
    if (!Array.isArray(msgs)) msgs = [];
  }
  renderChatMsgs(msgs);
}

function renderChatMsgs(msgs) {
  const container = document.getElementById('chatMsgs');
  const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
  container.innerHTML = '';
  let lastDay = '';
  msgs.forEach(m => {
    const day = fmtDay(m.created_at);
    if (day !== lastDay) { lastDay = day; const sep = document.createElement('div'); sep.className = 'day-sep'; sep.innerHTML = `<span>${day}</span>`; container.appendChild(sep); }
    const isMine = m.sender_id === SESSION.id;
    const row = document.createElement('div');
    row.className = `msg-row ${isMine ? 'mine' : 'theirs'}`;
    row.innerHTML = `
      <div class="msg-inner">
        ${!isMine && currentChat.type === 'group' ? `<div class="msg-sender">@${esc(m.sender_uname || '')}</div>` : ''}
        <div class="msg-bubble">${esc(m.content || '')}</div>
        <div class="msg-ts">${fmtTime(m.created_at)}</div>
      </div>
    `;
    container.appendChild(row);
  });
  if (atBottom || msgs.length < 20) container.scrollTop = container.scrollHeight;
}

document.getElementById('sendBtn').addEventListener('click', sendChatMsg);
document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(); } });

async function sendChatMsg() {
  if (!currentChat) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  if (currentChat.type === 'dm') {
    await apiPost('send-dm', { sender_id: SESSION.id, sender_uname: SESSION.username, receiver_id: currentChat.id, receiver_uname: currentChat.name.replace('@', ''), content: text });
  } else {
    await apiPost('send-group-message', { group_id: currentChat.id, sender_id: SESSION.id, sender_uname: SESSION.username, content: text });
  }
  fetchChatMsgs();
  loadChatList();
}

document.getElementById('notifBtn').addEventListener('click', async () => {
  openModal('notifModal');
  const list = document.getElementById('notifList');
  list.innerHTML = '<div class="empty-state"><div class="empty-sub">Cargando…</div></div>';
  const rows = await apiGet(`${API}?action=notifications&user_id=${SESSION.id}`);
  list.innerHTML = '';
  if (!Array.isArray(rows) || !rows.length) { list.innerHTML = '<div class="empty-state"><div class="empty-sub">Sin notificaciones</div></div>'; return; }
  rows.forEach(n => {
    const item = document.createElement('div');
    item.className = `notif-item${n.read ? '' : ' unread'}`;
    item.style.cssText = 'display:flex; gap:10px; align-items:flex-start; padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .12s;' + (n.read ? '' : 'background:var(--accent-glow);');
    item.innerHTML = `
      <div style="width:32px; height:32px; border-radius:50%; background:var(--dim); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px; height:13px; color:var(--blue);"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
      <div style="flex:1; min-width:0;"><div style="font-size:12px; line-height:1.5;">${esc(n.content || '')}</div><div style="font-size:10px; color:var(--muted); font-family:var(--mono); margin-top:3px;">${fmtDate(n.created_at)}</div></div>
      ${!n.read ? '<div style="width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; margin-top:4px;"></div>' : ''}
    `;
    item.addEventListener('click', async () => {
      if (!n.read) { await apiPost('mark-notif-read', { notif_id: n.id }); item.classList.remove('unread'); item.style.background = 'none'; item.querySelector('div:last-child')?.remove(); checkNotifs(); }
      if (n.type === 'dm' && n.from_uid) { closeModal('notifModal'); showPage('messages'); openChat({ type: 'dm', id: n.from_uid, name: `@${n.from_uname || '?'}` }); }
    });
    list.appendChild(item);
  });
});
document.getElementById('closeNotif').addEventListener('click', () => closeModal('notifModal'));
document.getElementById('markAllReadBtn').addEventListener('click', async () => { await apiPost('mark-all-notifs-read', { user_id: SESSION.id }); document.querySelectorAll('#notifList .notif-item.unread').forEach(el => { el.classList.remove('unread'); el.style.background = 'none'; el.querySelector('div:last-child')?.remove(); }); updateNotifBadge(0); toast('Todas leídas'); });

function updateNotifBadge(count) { document.getElementById('notifDot').classList.toggle('show', count > 0); }
async function checkNotifs() {
  const notifs = await apiGet(`${API}?action=notifications&user_id=${SESSION.id}&unread=1`);
  updateNotifBadge(Array.isArray(notifs) ? notifs.length : 0);
  const [unreadDms, unreadGroups] = await Promise.all([
    apiGet(`${API}?action=unread-dms&user_id=${SESSION.id}`),
    apiGet(`${API}?action=unread-group-messages&user_id=${SESSION.id}`)
  ]);
  document.getElementById('msgDot').classList.toggle('show', (Array.isArray(unreadDms) && unreadDms.length > 0) || (Array.isArray(unreadGroups) && unreadGroups.length > 0));
}
